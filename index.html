  --bg: #F7F4EE;

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: Georgia, serif; color: var(--deep); }

.scroll-zone {

  overflow-y: auto;
  -webkit-overflow-scrolling: touch;

nav {

.delta.bad { color: var(--terra); }

label.fl { display: block; font-size: 11px; font-family: sans-serif; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; }
input[type=number], input[type=text], textarea {

textarea { resize: none; }

.btn { width: 100%; padding: 13px; font-size: 15px; border: none; border-radius: 12px; cursor: pointer; font-family: sans-serif; font-weight: 600; margin-top: 6px; }
.btn-dark { background: var(--deep); color: #fff; }
.btn-teal { background: var(--teal); color: #fff; }

.hist-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.hist-row:last-child { border-bottom: none; }
.hist-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.hist-date { font-size: 12px; color: var(--muted); font-family: sans-serif; }

.pill-green { background: var(--teal-light); color: var(--teal); }
.pill-red { background: var(--terra-light); color: var(--terra); }

.hist-note { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 5px; font-family: sans-serif; }

.day-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 0 14px; margin-top: 14px; scrollbar-width: none; }

.bilan-bar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 7px; margin: 10px 14px 0; }
.bilan-cell { background: var(--surface); border-radius: 10px; padding: 9px 6px; text-align: center; border: 1px solid var(--border); }
.bilan-val { font-size: 17px; font-weight: 700; color: var(--deep); line-height: 1; }
.bilan-label { font-size: 10px; color: var(--muted); font-family: sans-serif; margin-top: 3px; }

.search-wrap { margin: 10px 14px 0; }
.food-list { margin: 6px 14px 0; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; max-height: 240px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.log-list { margin: 8px 14px 0; display: flex; flex-direction: column; gap: 5px; }

.log-detail { font-size: 11px; color: var(--muted); font-family: sans-serif; margin-top: 2px; }
.log-del { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding-left: 6px; flex-shrink: 0; }

.ai-box { margin: 10px 14px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.ai-head { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 12px; font-family: sans-serif; font-weight: 700; color: var(--deep); display: flex; align-items: center; gap: 6px; }
.ai-body { padding: 14px; font-size: 13px; font-family: sans-serif; line-height: 1.65; color: var(--deep); white-space: pre-wrap; }
.ai-loading { color: var(--muted); }

.subtle { font-size: 12px; color: var(--muted); font-family: sans-serif; line-height: 1.5; }
.spacer { height: 14px; }
</style>

function lsSet(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

function weekKey(d = new Date()) {
  const x = new Date(d); x.setHours(12,0,0,0);
  const diff = x.getDay() === 0 ? -6 : 1 - x.getDay();
  x.setDate(x.getDate() + diff);
  return x.toISOString().slice(0,10);
}

// === FIREBASE ===
async function loadEntries() {
  if (!fbReady) { entries = lsGet('sante_bak', []); return; }
  try {
    const snap = await getDocs(query(collection(db,'users',UID,'pesees'), orderBy('key','desc')));
    entries = snap.docs.map(d => d.data());
    lsSet('sante_bak', entries);
  } catch(e) {
    entries = lsGet('sante_bak', []);
  }
}
async function saveEntry(e) {
  lsSet('sante_bak', entries);
  if (!fbReady) return;
  try { await setDoc(doc(db,'users',UID,'pesees',e.key), e); } catch(_) {}
}

  const k = todayKey();
  journal[k] = lsGet('j_' + k, []);
}
function saveJournal() {
  const k = todayKey();
  lsSet('j_' + k, journal[k] || []);
}
function todayItems() { return journal[todayKey()] || []; }
function totals() {
  return todayItems().reduce((a, x) => ({ k: a.k+x.k, p: a.p+x.p, g: a.g+x.g, l: a.l+x.l }), { k:0, p:0, g:0, l:0 });
}

function addFood(i) {
  const f = ALIMENTS[i];
  const k = todayKey();
  if (!journal[k]) journal[k] = [];
  journal[k].push({ id: Date.now() + Math.random(), ...f });
  saveJournal();
  render();
}
function removeFood(id) {
  const k = todayKey();
  journal[k] = (journal[k]||[]).filter(x => x.id !== id);
  saveJournal();
  render();
}

      model: 'claude-sonnet-4-20250514',
      max_tokens: 700,
      messages: [{ role: 'user', content: prompt }]

  const d = await res.json();
  if (!res.ok) throw new Error(d.error || 'Erreur API');
  return d.content.find(x => x.type === 'text')?.text || '';
}

async function iaHome() {
  if (!entries.length) { alert('Ajoute au moins une pesee.'); return; }
  aiHome = 'Analyse en cours...';
  render();
  const e = entries[0], prev = entries[1];
  const diff = prev ? (e.poids - prev.poids).toFixed(1) : '0.0';
  const pct = Math.round((DEPART - e.poids) / (DEPART - OBJECTIF) * 100);
  try {
    aiHome = await askClaude(
      'Tu es un coach sante pragmatique. Reponds en francais, ton direct et bienveillant, 8 lignes max.\n' +
      'Bilan hebdo: poids=' + e.poids + 'kg, variation=' + diff + 'kg, moral=' + e.moral + '/5, ' +
      'plan=' + e.plan + '/5, activite=' + pasLbl(e.pas) + ', note=' + (e.note||'aucune') + ', ' +
      'progression=' + pct + '%, objectif=' + OBJECTIF + 'kg depuis ' + DEPART + 'kg.\n' +
      'Donne: 1) interpretation 2) vigilance 3) action concrete pour la semaine.'
    );
  } catch(err) { aiHome = 'Erreur : ' + err.message; }
  render();
}

async function iaSaisie() {
  const p = parseFloat(String(form.poids).replace(',','.'));
  if (!p || p < 40 || p > 250) { alert('Entre un poids valide.'); return; }
  aiSaisie = 'Analyse en cours...';
  render();
  try {
    aiSaisie = await askClaude(
      'Coach sante. Analyse cette pesee en francais, 8 lignes max.\n' +
      'poids=' + p + 'kg, moral=' + form.moral + '/5, plan=' + form.plan + '/5, ' +
      'activite=' + pasLbl(form.pas) + ', note=' + (form.note||'aucune') + ', ' +
      'objectif=' + OBJECTIF + 'kg depuis ' + DEPART + 'kg.\n' +
      'Donne: 1) lecture rapide 2) point positif 3) conseil concret pour les 7 prochains jours.'
    );
  } catch(err) { aiSaisie = 'Erreur : ' + err.message; }
  render();
}

async function iaJournal() {
  const items = todayItems();
  if (!items.length) { alert('Ajoute au moins un aliment.'); return; }
  aiJournal = 'Analyse en cours...';
  render();
  const t = totals();
  const liste = items.map(x => x.n + ': ' + x.k + ' kcal, ' + x.p + 'g prot').join(', ');
  try {
    aiJournal = await askClaude(
      'Coach nutrition. Analyse ce journal en francais, 10 lignes max, sans moraliser.\n' +
      'Objectifs: ' + KCAL_OBJ + ' kcal, ' + PROT_OBJ + 'g prot.\n' +
      'Totaux: ' + t.k + ' kcal, ' + t.p + 'g prot, ' + t.g + 'g gluc, ' + t.l + 'g lip.\n' +
      'Aliments: ' + liste + '\n' +
      'Donne: 1) qualite globale 2) point fort 3) point a corriger 4) ajustement concret.'
    );
  } catch(err) { aiJournal = 'Erreur : ' + err.message; }
  render();
}

// === VUES ===
function vHome() {
  const e = entries[0], prev = entries[1];
  const poids = e ? e.poids.toFixed(1) : '—';
  const delta = e && prev ? (e.poids - prev.poids) : null;
  const deltaHtml = delta === null
    ? '<div class="delta neutral">Premiere mesure</div>'
    : delta < 0 ? '<div class="delta good">' + Math.abs(delta).toFixed(1) + ' kg depuis la derniere pesee</div>'
    : delta > 0 ? '<div class="delta bad">+' + delta.toFixed(1) + ' kg depuis la derniere pesee</div>'
    : '<div class="delta neutral">Stable depuis la derniere pesee</div>';

  const avg = entries.length < 2 ? 0 : (() => {
    const o = entries[entries.length-1], n = entries[0];
    const d = (new Date(n.key) - new Date(o.key)) / 86400000;
    return d > 0 ? +((o.poids - n.poids) / d * 7).toFixed(2) : 0;
  })();

  return [
    '<div class="card">',
      '<div class="card-title">Poids actuel</div>',
      '<div class="ring-wrap">',
        '<div>' + ring() + '</div>',
        '<div>',
          '<div class="big-num">' + poids + ' <span class="unit">kg</span></div>',
          deltaHtml,
        '</div>',
      '</div>',
    '</div>',
    '<div class="grid2">',
      '<div class="mini-card"><div class="mini-val">' + entries.length + '</div><div class="mini-label">Pesees</div></div>',
      '<div class="mini-card"><div class="mini-val">' + avg + '</div><div class="mini-label">kg / semaine</div></div>',
    '</div>',
    '<div class="status-box status-ok">Objectif : 84 kg · Echeance : 27 juillet 2026 · ' + daysLeft() + ' jours restants.</div>',
    '<div style="margin:10px 14px 0">',
      '<button class="btn btn-teal" onclick="iaHome()">Bilan IA de la semaine</button>',
    '</div>',
    aiHome ? '<div class="ai-box"><div class="ai-head">&#129302; Analyse IA</div><div class="ai-body' + (aiHome==='Analyse en cours...'?' ai-loading':'') + '">' + esc(aiHome) + '</div></div>' : '',
    '<div class="spacer"></div>',
  ].join('');
}

function vSaisie() {
  return [
    '<div class="card">',
      '<div class="card-title">Pesee · ' + weekLabel(weekKey()) + '</div>',
      '<label class="fl">Poids ce matin (kg)</label>',
      '<input type="number" step="0.1" min="40" max="250" placeholder="ex: 92.5" value="' + esc(form.poids) + '" oninput="form.poids=this.value">',
      '<label class="fl">Moral cette semaine</label>',
      '<div class="slider-row"><input type="range" min="1" max="5" step="1" value="' + form.moral + '" oninput="form.moral=+this.value;render()">' + dots(form.moral) + '</div>',
      '<label class="fl">Tenue du plan</label>',
      '<div class="slider-row"><input type="range" min="1" max="5" step="1" value="' + form.plan + '" oninput="form.plan=+this.value;render()">' + dots(form.plan,'deep') + '</div>',
      '<label class="fl">Activite</label>',
      '<div class="pas-row">',
        '<button class="pas-btn ' + (form.pas==='low'?'low':'') + '" onclick="setPas(\'low\')">&lt; 5 000</button>',
        '<button class="pas-btn ' + (form.pas==='mid'?'mid':'') + '" onclick="setPas(\'mid\')">5-10k</button>',
        '<button class="pas-btn ' + (form.pas==='high'?'high':'') + '" onclick="setPas(\'high\')">&gt; 10 000</button>',
      '</div>',
      '<label class="fl">Note libre</label>',
      '<textarea rows="3" placeholder="Bonne semaine, faim ok..." oninput="form.note=this.value">' + esc(form.note) + '</textarea>',
      '<button class="btn btn-dark" onclick="submitForm()">Enregistrer la pesee</button>',
      '<button class="btn btn-ghost" onclick="iaSaisie()">Analyser avec l\'IA</button>',
      '<button class="btn btn-ghost" onclick="goTo(\'home\')">Annuler</button>',
    '</div>',
    aiSaisie ? '<div class="ai-box"><div class="ai-head">&#129302; Retour IA</div><div class="ai-body' + (aiSaisie==='Analyse en cours...'?' ai-loading':'') + '">' + esc(aiSaisie) + '</div></div>' : '',
    '<div class="spacer"></div>',
  ].join('');
}

function vHistorique() {
  if (!entries.length) return '<div class="empty">Aucune pesee enregistree.<br>Commence lundi matin a jeun.</div>';
  const rows = entries.map((e, i) => {
    const prev = entries[i+1];
    const diff = prev ? prev.poids - e.poids : null;
    const pill = diff === null
      ? '<span class="pill pill-gray">depart</span>'
      : diff > 0 ? '<span class="pill pill-green">-' + diff.toFixed(1) + ' kg</span>'
      : '<span class="pill pill-red">+' + Math.abs(diff).toFixed(1) + ' kg</span>';
    return '<div class="hist-row">'
      + '<div class="hist-top"><div><div class="hist-date">' + weekLabel(e.key) + '</div><div class="hist-poids">' + e.poids.toFixed(1) + ' kg</div></div>' + pill + '</div>'
      + '<div class="hist-meta">' + dots(e.moral) + dots(e.plan,'deep') + '<span style="font-size:12px;font-weight:700;color:' + pasClr(e.pas) + '">' + pasLbl(e.pas) + '</span></div>'
      + (e.note ? '<div class="hist-note">"' + esc(e.note) + '"</div>' : '')
      + '</div>';
  }).join('');
  return '<div class="card"><div class="card-title">Toutes les pesees (' + entries.length + ')</div>' + rows + '</div><div class="spacer"></div>';
}

function vRepas() {
  const d = DAYS[dayIdx];
  const tabs = DAYS.map((x, i) => '<button class="day-tab' + (i===dayIdx?' active':'') + '" onclick="setDay(' + i + ')">' + x.nom + '</button>').join('');
  const meals = d.meals.map(m =>
    '<div class="meal-card"><div class="meal-time">' + m.t + ' · ' + m.k + ' kcal</div><div class="meal-name">' + m.n + '</div><div class="meal-desc">' + m.d + '</div></div>'
  ).join('');
  return '<div class="card"><div class="card-title">Jours types</div><div class="day-tabs">' + tabs + '</div></div>' + meals + '<div class="spacer"></div>';
}

function vJournal() {
  const t = totals();
  const items = todayItems();
  const filtered = ALIMENTS.filter(a => !foodQ || a.n.toLowerCase().includes(foodQ.toLowerCase())).slice(0, 15);

  const bilanBar = '<div class="bilan-bar">'
    + '<div class="bilan-cell"><div class="bilan-val">' + t.k + '</div><div class="bilan-label">kcal</div></div>'
    + '<div class="bilan-cell"><div class="bilan-val">' + t.p + 'g</div><div class="bilan-label">prot.</div></div>'
    + '<div class="bilan-cell"><div class="bilan-val">' + t.g + 'g</div><div class="bilan-label">gluc.</div></div>'
    + '<div class="bilan-cell"><div class="bilan-val">' + t.l + 'g</div><div class="bilan-label">lip.</div></div>'
    + '</div>';

  const status = '<div class="status-box ' + (t.k > KCAL_OBJ ? 'status-warn' : 'status-ok') + '">'
    + 'Objectif : ' + KCAL_OBJ + ' kcal · ' + PROT_OBJ + 'g proteines.'
    + '</div>';

  const search = '<div class="search-wrap"><input type="text" placeholder="Chercher un aliment..." value="' + esc(foodQ) + '" oninput="foodQ=this.value;render()"></div>';

  const foodRows = '<div class="food-list">' + filtered.map((a, i) => {
    const idx = ALIMENTS.indexOf(a);
    return '<div class="food-row"><div><div class="food-name">' + a.n + '</div><div class="food-macros">' + a.k + ' kcal · ' + a.p + 'g prot · ' + a.g + 'g gluc · ' + a.l + 'g lip</div></div>'
      + '<button class="food-add" onclick="addFood(' + idx + ')">+</button></div>';
  }).join('') + '</div>';

  const logRows = items.length
    ? '<div class="log-list">' + items.map(x =>
        '<div class="log-item"><div><div class="log-name">' + x.n + '</div><div class="log-detail">' + x.k + ' kcal · ' + x.p + 'g prot</div></div>'
        + '<button class="log-del" onclick="removeFood(' + x.id + ')">x</button></div>'
      ).join('') + '</div>'
    : '<div class="empty">Aucun aliment ajoute aujourd\'hui.</div>';

  const iaBtn = '<div style="margin:10px 14px 0"><button class="btn btn-terra" onclick="iaJournal()">Analyser mon journal avec l\'IA</button></div>';
  const iaResult = aiJournal
    ? '<div class="ai-box"><div class="ai-head">&#129302; Bilan IA du journal</div><div class="ai-body' + (aiJournal==='Analyse en cours...'?' ai-loading':'') + '">' + esc(aiJournal) + '</div></div>'
    : '';

  return bilanBar + status + search + foodRows + logRows + iaBtn + iaResult + '<div class="spacer"></div>';
}

// === RENDER ===
function render() {
  const T = { home:'Mon suivi sante', saisie:'Pesee hebdomadaire', historique:'Historique', repas:'Plan repas mediterraneen', journal:'Journal alimentaire' };
  const S = {
    home: 'Objectif 84 kg · 27 juillet 2026 · ' + daysLeft() + ' jours',
    saisie: 'Lundi matin a jeun',
    historique: entries.length + ' semaine' + (entries.length>1?'s':'') + ' enregistree' + (entries.length>1?'s':''),
    repas: 'Cadre simple et stable',
    journal: 'Suivi du jour'
  };
  $('pg-title').textContent = T[view];
  $('pg-sub').textContent = S[view];
  const V = { home: vHome, saisie: vSaisie, historique: vHistorique, repas: vRepas, journal: vJournal };
  $('main').innerHTML = V[view]();
}

// === NAVIGATION ===
function goTo(v) {
  view = v;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  $('nav-' + v).classList.add('active');
  render();
}
function setDay(i) { dayIdx = i; render(); }
function setPas(v) { form.pas = v; render(); }

function submitForm() {
  const p = parseFloat(String(form.poids).replace(',','.'));
  if (!p || p < 40 || p > 250) { alert('Entre un poids valide, ex: 92.5'); return; }
  const k = weekKey();
  entries = [
    { key: k, poids: p, moral: form.moral, plan: form.plan, pas: form.pas, note: form.note.trim() },
    ...entries.filter(e => e.key !== k)
  ].sort((a,b) => b.key.localeCompare(a.key));
  saveEntry(entries[0]);
  form = { poids:'', moral:3, plan:3, pas:'mid', note:'' };
  aiSaisie = '';
  goTo('home');
}

// === EXPOSE GLOBALS ===
window.goTo = goTo;
window.setDay = setDay;
window.setPas = setPas;
window.submitForm = submitForm;
window.addFood = addFood;
window.removeFood = removeFood;
window.render = render;
window.iaHome = iaHome;
window.iaSaisie = iaSaisie;
window.iaJournal = iaJournal;
Object.defineProperty(window, 'form', { get(){ return form; }, set(v){ form = v; } });
Object.defineProperty(window, 'foodQ', { get(){ return foodQ; }, set(v){ foodQ = v; } });

// === BOOT ===
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

$('main').innerHTML = '<div class="empty" style="padding-top:60px"><div style="font-size:32px;margin-bottom:12px">&#9200;</div><div>Connexion...</div></div>';
loadJournal();
entries = lsGet('sante_bak', []);

try {
  await signInAnonymously(auth);
  fbReady = true;
} catch(e) {
  fbReady = false;
}
await loadEntries();
render();
</script>
</body>
