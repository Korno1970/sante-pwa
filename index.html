<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F7F4EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Santé">
<title>Santé · Sylvain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #F7F4EF;
  --surface:     #FFFFFF;
  --surface2:    #EEE9E1;
  --ink:         #1C1A16;
  --ink2:        #5C5650;
  --ink3:        #9C9690;
  --border:      rgba(28,26,22,0.09);
  --border2:     rgba(28,26,22,0.16);
  --accent:      #C4714A;
  --accent-light:#F5EDE7;
  --accent-mid:  #D4896A;
  --sage:        #7A9E8A;
  --sage-light:  #EAF1EC;
  --gold:        #C9A84C;
  --gold-light:  #F5F0E4;
  --err:         #C05050;
  --err-light:   #FAEAEA;
  --r:           16px;
  --r-sm:        10px;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bot:    env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

#app {
  max-width: 430px; margin: 0 auto;
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column; overflow: hidden;
  position: relative;
}

/* ── HEADER ── */
.header {
  flex-shrink: 0;
  padding: calc(16px + var(--safe-top)) 22px 14px;
  background: var(--bg);
  display: flex; align-items: flex-end; justify-content: space-between;
  position: relative; z-index: 10;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 500; letter-spacing: -0.5px;
  line-height: 1; color: var(--ink);
  transition: opacity 0.2s;
}
.header-sub { font-size: 11px; color: var(--ink3); margin-top: 4px; font-weight: 300; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--sage); box-shadow: 0 0 0 3px var(--sage-light);
  transition: all 0.3s;
}
.status-dot.offline { background: var(--gold); box-shadow: 0 0 0 3px var(--gold-light); }

/* ── SCROLL VIEWPORT ── */
.scroll-viewport {
  flex: 1; overflow: hidden; position: relative;
}

/* ── SLIDE TRANSITION ── */
.view-slider {
  display: flex; height: 100%;
  transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}
.view-pane {
  flex: 0 0 100%; height: 100%;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}

/* ── NAV ── */
nav {
  flex-shrink: 0;
  display: flex; background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot);
  position: relative; z-index: 10;
}
nav button {
  flex: 1; background: none; border: none; cursor: pointer;
  padding: 10px 2px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 500;
  letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink3);
  transition: color 0.2s;
}
nav button.active { color: var(--accent); }
.nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.nav-pip {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--accent); opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
}
nav button.active .nav-pip { opacity: 1; transform: scale(1.2); }

/* ── HERO STRIP ── */
.hero-strip {
  background: var(--ink); margin: 14px 16px 0; border-radius: var(--r);
  padding: 22px 22px 20px;
  display: flex; align-items: center; justify-content: space-between;
  overflow: hidden; position: relative;
}
.hero-strip::after {
  content: ''; position: absolute;
  top: -50px; right: -50px;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(196,113,74,0.18) 0%, transparent 70%);
  pointer-events: none;
}
.hero-weight {
  font-family: 'Playfair Display', serif;
  font-size: 56px; font-weight: 400; letter-spacing: -2px; color: #fff; line-height: 1;
}
.hero-weight span { font-size: 20px; color: rgba(255,255,255,0.4); font-weight: 300; }
.hero-meta { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 8px; font-weight: 300; }
.hero-delta {
  display: inline-block; margin-top: 10px; font-size: 12px; font-weight: 500;
  padding: 4px 12px; border-radius: 20px;
  background: rgba(122,158,138,0.25); color: #9ED4B4;
}
.hero-delta.bad { background: rgba(192,80,80,0.2); color: #F4A0A0; }

/* ── CARD ── */
.card {
  background: var(--surface); border-radius: var(--r);
  margin: 12px 16px 0; padding: 20px;
  border: 1px solid var(--border);
}
.card-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink3); margin-bottom: 16px;
}
.spacer { height: 20px; }

/* ── MACROS ── */
.macro-row { display: flex; gap: 8px; margin: 12px 16px 0; }
.macro-pill {
  flex: 1; background: var(--surface); border-radius: var(--r-sm);
  padding: 12px 8px; text-align: center; border: 1px solid var(--border);
}
.macro-val {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 500; color: var(--ink); line-height: 1;
}
.macro-val.ok   { color: var(--sage); }
.macro-val.over { color: var(--err); }
.macro-sub { font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); margin-top: 4px; }

/* ── ALERT ── */
.alert { margin: 10px 16px 0; border-radius: var(--r-sm); padding: 11px 16px; font-size: 12px; line-height: 1.6; }
.alert.ok      { background: var(--sage-light);  color: #3A6A52; border: 1px solid rgba(122,158,138,0.3); }
.alert.err     { background: var(--err-light);   color: var(--err); border: 1px solid rgba(192,80,80,0.2); }
.alert.neutral { background: var(--surface2);    color: var(--ink2); border: 1px solid var(--border); }

/* ── TIMELINE ── */
.timeline { padding: 4px 16px 0; }
.tl-item { display: flex; gap: 12px; }
.tl-line { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.tl-dot-wrap { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.tl-connector { width: 1px; flex: 1; min-height: 10px; background: var(--border2); margin: 2px 0; }
.tl-body {
  flex: 1; background: var(--surface); border-radius: var(--r-sm);
  padding: 12px 14px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  margin-bottom: 6px;
}
.tl-name   { font-size: 13px; font-weight: 400; color: var(--ink); }
.tl-detail { font-size: 11px; color: var(--ink3); margin-top: 2px; font-weight: 300; }
.tl-del    { background: none; border: none; cursor: pointer; color: var(--ink3); padding: 4px 6px; border-radius: 6px; font-size: 14px; transition: color 0.15s; }
.tl-del:hover { color: var(--err); }

/* ── REPAS ── */
.day-tabs { display: flex; gap: 7px; overflow-x: auto; padding: 14px 16px 0; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex: 0 0 auto; padding: 7px 16px; border-radius: 20px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--ink2); font-size: 12px; font-family: 'DM Sans', sans-serif;
  font-weight: 400; cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.day-tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

.meal-card { background: var(--surface); border-radius: var(--r); margin: 10px 16px 0; border: 1px solid var(--border); overflow: hidden; }
.meal-illus { display: flex; align-items: center; justify-content: center; padding: 28px 0 18px; background: var(--bg); position: relative; }
.meal-illus-label {
  position: absolute; bottom: 10px; left: 0; right: 0; text-align: center;
  font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); font-weight: 500;
}
.meal-info { padding: 16px 18px 18px; }
.meal-moment { font-size: 9px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); }
.meal-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; color: var(--ink); margin: 5px 0 3px; line-height: 1.2; }
.meal-kcal { font-size: 11px; font-weight: 500; color: var(--accent); letter-spacing: 0.04em; }
.meal-desc { font-size: 12px; color: var(--ink3); line-height: 1.65; margin-top: 7px; font-weight: 300; }

/* ── FORMS ── */
.field-label { display: block; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; }
input[type=text], input[type=number], textarea {
  width: 100%; padding: 13px 15px; font-size: 16px;
  font-family: 'DM Sans', sans-serif; font-weight: 400;
  border: 1px solid var(--border2); border-radius: var(--r-sm);
  background: var(--bg); color: var(--ink);
  outline: none; margin-bottom: 18px;
  -webkit-appearance: none; appearance: none; transition: border-color 0.15s, background 0.15s;
}
input:focus, textarea:focus { border-color: var(--accent-mid); background: var(--surface); }
textarea { resize: none; line-height: 1.6; }

.slider-wrap { margin-bottom: 18px; }
.slider-head { display: flex; justify-content: space-between; margin-bottom: 10px; }
.slider-lbl { font-size: 12px; color: var(--ink2); }
.slider-val { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--ink); }
input[type=range] {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 3px; border-radius: 2px; outline: none; cursor: pointer; border: none; padding: 0; margin: 0;
  background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct,50%), var(--surface2) var(--pct,50%), var(--surface2) 100%);
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--surface); border: 2px solid var(--accent);
  box-shadow: 0 2px 6px rgba(196,113,74,0.3);
}
input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--surface); border: 2px solid var(--accent); box-shadow: none; }

.pas-row { display: flex; gap: 7px; margin-bottom: 18px; }
.pas-btn { flex: 1; padding: 11px 4px; font-size: 11px; font-weight: 500; font-family: 'DM Sans', sans-serif; border-radius: var(--r-sm); border: 1px solid var(--border2); background: transparent; color: var(--ink3); cursor: pointer; transition: all 0.15s; }
.pas-btn.low  { border-color: var(--err);  background: var(--err-light);  color: var(--err); }
.pas-btn.mid  { border-color: var(--gold); background: var(--gold-light); color: var(--gold); }
.pas-btn.high { border-color: var(--sage); background: var(--sage-light); color: var(--sage); }

/* ── BUTTONS ── */
.btn { width: 100%; padding: 15px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; border: none; border-radius: var(--r-sm); cursor: pointer; margin-top: 6px; transition: opacity 0.15s, transform 0.1s; }
.btn:active { opacity: 0.8; transform: scale(0.99); }
.btn-primary { background: var(--ink); color: var(--bg); }
.btn-subtle  { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(196,113,74,0.2); }

/* ── BALANCE ── */
.balance-scene { display: flex; flex-direction: column; align-items: center; padding: 24px 0 16px; }
.weight-input-big {
  font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 400;
  letter-spacing: -2px; color: var(--ink); text-align: center;
  width: 100%; border: none; background: transparent; outline: none;
  -webkit-appearance: none; appearance: none; padding: 0; margin-top: 16px;
}
.weight-input-big::placeholder { color: var(--surface2); }
.weight-unit-label { font-size: 12px; color: var(--ink3); letter-spacing: 0.06em; text-align: center; margin-top: 2px; text-transform: uppercase; }

/* ── BILAN ── */
.hist-item { padding: 18px 0; border-bottom: 1px solid var(--border); }
.hist-item:last-child { border-bottom: none; }
.hist-date { font-size: 11px; color: var(--ink3); font-weight: 300; }
.hist-poids { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 400; letter-spacing: -1px; color: var(--ink); margin-top: 2px; }
.chip { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
.chip-ok   { background: var(--sage-light); color: #3A6A52; border: 1px solid rgba(122,158,138,0.3); }
.chip-err  { background: var(--err-light);  color: var(--err); border: 1px solid rgba(192,80,80,0.2); }
.chip-gray { background: var(--surface2);   color: var(--ink3); border: 1px solid var(--border2); }
.hist-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
.hist-note { font-size: 11px; color: var(--ink3); margin-top: 8px; font-style: italic; line-height: 1.65; font-weight: 300; }
.dots { display: flex; gap: 4px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border2); }
.dot.on   { background: var(--accent); border-color: var(--accent); }
.dot.blue { background: #7A9EC4; border-color: #7A9EC4; }

/* ── CHAT ── */
.chat-wrap { display: flex; flex-direction: column; padding: 16px 16px 0; }
.chat-msg { margin-bottom: 10px; }
.chat-msg.user .bubble { background: var(--ink); color: #F7F4EF; border-radius: 16px 16px 4px 16px; padding: 12px 16px; font-size: 13px; line-height: 1.65; margin-left: 36px; font-weight: 300; }
.chat-msg.ai .bubble { background: var(--surface); color: var(--ink2); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; padding: 12px 16px; font-size: 13px; line-height: 1.75; margin-right: 36px; font-weight: 300; white-space: pre-wrap; }
.chat-msg.ai.loading .bubble { color: var(--ink3); }
.chat-input-wrap { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; align-items: flex-end; }
.chat-input { flex: 1; padding: 12px 15px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 300; border: 1px solid var(--border2); border-radius: 12px; background: var(--surface); color: var(--ink); outline: none; resize: none; max-height: 100px; line-height: 1.5; margin-bottom: 0; transition: border-color 0.15s; }
.chat-input:focus { border-color: var(--accent-mid); }
.chat-send { width: 42px; height: 42px; border-radius: 12px; background: var(--ink); color: var(--bg); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
.chat-send:hover { background: var(--accent); }

/* ── AI BOX ── */
.ai-box { margin: 12px 16px 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.ai-head { padding: 11px 16px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 7px; }
.ai-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.4s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.65);} }
.ai-body { padding: 16px; font-size: 13px; line-height: 1.8; color: var(--ink2); white-space: pre-wrap; font-weight: 300; }

.saisie-card { background: var(--surface); border-radius: var(--r); margin: 12px 16px 0; border: 1px solid var(--border); overflow: hidden; }
.saisie-head { padding: 14px 18px 12px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); }
.saisie-body { padding: 16px 18px 18px; }
.empty { text-align: center; padding: 48px 24px; color: var(--ink3); font-size: 13px; line-height: 1.8; font-weight: 300; }

/* ── COMPACT MODE ── */
.compact .hero-weight { font-size: 42px; }
.compact .header-title { font-size: 22px; }
.compact .card { padding: 14px; }
.compact .macro-val { font-size: 17px; }
.compact .meal-illus { padding: 18px 0 12px; }
.compact .balance-scene { padding: 14px 0 10px; }
.compact .weight-input-big { font-size: 44px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title" id="pg-title">Journal</div>
      <div class="header-sub" id="pg-sub">94 → 84 kg · 27 juillet 2026</div>
    </div>
    <div class="status-dot offline" id="fb-dot"></div>
  </div>

  <div class="scroll-viewport">
    <div class="view-slider" id="view-slider">
      <!-- 5 panes: journal coach repas pesee bilan -->
      <div class="view-pane" id="pane-journal"></div>
      <div class="view-pane" id="pane-coach"></div>
      <div class="view-pane" id="pane-repas"></div>
      <div class="view-pane" id="pane-pesee"></div>
      <div class="view-pane" id="pane-bilan"></div>
    </div>
  </div>

  <nav id="nav">
    <button class="active" onclick="goTo(0)" id="nav-0">
      <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg></span>
      <span class="nav-pip"></span>Journal
    </button>
    <button onclick="goTo(1)" id="nav-1">
      <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
      <span class="nav-pip"></span>Coach
    </button>
    <button onclick="goTo(2)" id="nav-2">
      <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6h3.5"/><path d="M16 22v-5"/></svg></span>
      <span class="nav-pip"></span>Repas
    </button>
    <button onclick="goTo(3)" id="nav-3">
      <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 3"/></svg></span>
      <span class="nav-pip"></span>Pesée
    </button>
    <button onclick="goTo(4)" id="nav-4">
      <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
      <span class="nav-pip"></span>Bilan
    </button>
  </nav>
</div>

<!-- Tweaks -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "depart": 94,
  "objectif": 84,
  "kcalObj": 1500,
  "protObj": 90,
  "dateTarget": "27 juillet 2026",
  "compact": false
}/*EDITMODE-END*/;

function TweaksApp() {
  const { tweaks: rawTweaks, setTweak } = useTweaks(TWEAK_DEFAULTS);
  const tweaks = rawTweaks || TWEAK_DEFAULTS;
  if (!tweaks) return null;

  React.useEffect(() => {
    window.__tweaks = tweaks;
    window.dispatchEvent(new CustomEvent('tweaks-changed', { detail: tweaks }));
  }, [tweaks]);

  return (
    <TweaksPanel>
      <TweakSection label="Programme">

/* ── BALANCE SVG AVEC CADRAN ── */
function svgBalanceDial(weight) {
  const w = parseFloat(String(weight||'').replace(',','.'));
  const hasW = !isNaN(w) && w > 0;
  // aiguille : 0° = objectif, dévie vers droite si > objectif
  const deviation = hasW ? Math.max(-80, Math.min(80, (w - 84) * 6)) : 0;
  const needleAngle = deviation; // en degrés, 0 = vertical
  // rotation aiguille depuis centre du cadran
  const cx = 90, cy = 64, r = 44;
  // aiguille
  const rad = (needleAngle - 90) * Math.PI / 180;
  const nx = cx + (r - 10) * Math.cos(rad);
  const ny = cy + (r - 10) * Math.sin(rad);

  // graduations du cadran (bas = 60kg, haut = 110kg)
  const ticks = [];
  for (let kg = 60; kg <= 110; kg += 5) {
    const pct = (kg - 60) / (110 - 60); // 0 à 1
    const angle = -150 + pct * 300; // de -150° à +150°
    const aRad = (angle - 90) * Math.PI / 180;
    const isObj = kg === 84;
    const isMajor = kg % 10 === 0;
    const inner = isObj ? r - 14 : isMajor ? r - 12 : r - 8;
    const outer = r - 3;
    const x1 = cx + inner * Math.cos(aRad);
    const y1 = cy + inner * Math.sin(aRad);
    const x2 = cx + outer * Math.cos(aRad);
    const y2 = cy + outer * Math.sin(aRad);
    const lx = cx + (r + 8) * Math.cos(aRad);
    const ly = cy + (r + 8) * Math.sin(aRad);
    ticks.push({ x1,y1,x2,y2,lx,ly, kg, isObj, isMajor });
  }

  // zone verte (objectif atteint) : 60kg à 87kg
  const startAngle = -150; // 60kg
  const endAngle = -150 + ((87-60)/(110-60))*300; // ~87kg
  const sa = (startAngle - 90)*Math.PI/180;
  const ea = (endAngle - 90)*Math.PI/180;
  const arcR = r - 2;
  const arcX1 = cx + arcR * Math.cos(sa), arcY1 = cy + arcR * Math.sin(sa);
  const arcX2 = cx + arcR * Math.cos(ea), arcY2 = cy + arcR * Math.sin(ea);
  const large = (endAngle - startAngle) > 180 ? 1 : 0;

  return `<svg width="180" height="120" viewBox="0 0 180 120" fill="none">
    <!-- fond balance -->
    <rect x="20" y="88" width="140" height="22" rx="11" fill="#E2DDD6"/>
    <rect x="28" y="82" width="124" height="14" rx="7" fill="#EEE9E1"/>
    <!-- pied central -->
    <rect x="85" y="100" width="10" height="16" rx="4" fill="#D4CEC5"/>
    <!-- cadran -->
    <circle cx="${cx}" cy="${cy}" r="${r+14}" fill="white" stroke="#E2DDD6" stroke-width="1.5"/>
    <circle cx="${cx}" cy="${cy}" r="${r+14}" fill="none" stroke="#EEE9E1" stroke-width="1"/>
    <!-- zone verte objectif -->
    <path d="M ${arcX1} ${arcY1} A ${arcR} ${arcR} 0 ${large} 1 ${arcX2} ${arcY2}"
      stroke="#7A9E8A" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.25"/>
    <!-- graduations -->
    ${ticks.map(t => `
      <line x1="${t.x1.toFixed(1)}" y1="${t.y1.toFixed(1)}" x2="${t.x2.toFixed(1)}" y2="${t.y2.toFixed(1)}"
        stroke="${t.isObj ? '#7A9E8A' : t.isMajor ? '#9C9690' : '#C8C2B8'}"
        stroke-width="${t.isObj ? 2 : t.isMajor ? 1.5 : 1}"/>
      ${t.isMajor ? `<text x="${t.lx.toFixed(1)}" y="${(t.ly+3).toFixed(1)}"
        text-anchor="middle" font-size="7" fill="${t.isObj ? '#7A9E8A' : '#9C9690'}"
        font-family="DM Sans,sans-serif" font-weight="${t.isObj?'600':'400'}">${t.kg}</text>` : ''}
    `).join('')}
    <!-- aiguille -->
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}"
      stroke="${hasW && w <= 87 ? '#7A9E8A' : '#C4714A'}" stroke-width="2.5" stroke-linecap="round"
      style="transform-origin:${cx}px ${cy}px;transition:all 0.7s cubic-bezier(0.34,1.56,0.64,1)"/>
    <!-- pivot -->
    <circle cx="${cx}" cy="${cy}" r="5" fill="${hasW && w <= 87 ? '#7A9E8A' : '#C4714A'}" stroke="white" stroke-width="2"
      style="transition:fill 0.4s"/>
    <!-- picto balance (plateau) sous le cadran -->
    <ellipse cx="${cx}" cy="96" rx="20" ry="4" fill="#D4CEC5"/>
  </svg>`;
}

/* ── COURBE ── */
function svgCurve(data) {
  if (!data || data.length < 2) return '';
  const pts = [...data].reverse();
  const weights = pts.map(e => e.poids);
  const tw = getTweaks();
  const minW = Math.min(...weights, tw.objectif) - 1.5;
  const maxW = Math.max(...weights, tw.depart) + 1.5;
  const W = 320, H = 100, PAD = 14;
  const x = i => PAD + (i / (pts.length-1)) * (W - PAD*2);
  const y = w => H - PAD - ((w-minW)/(maxW-minW)) * (H-PAD*2);
  const pathD = pts.map((e,i) => `${i===0?'M':'L'} ${x(i).toFixed(1)} ${y(e.poids).toFixed(1)}`).join(' ');
  const areaD = `${pathD} L ${x(pts.length-1).toFixed(1)} ${H} L ${x(0).toFixed(1)} ${H} Z`;
  const yObj = y(tw.objectif);
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none" style="width:100%;height:auto;display:block">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#C4714A" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#C4714A" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${areaD}" fill="url(#areaGrad)"/>
    <line x1="${PAD}" y1="${yObj.toFixed(1)}" x2="${W-PAD}" y2="${yObj.toFixed(1)}"
      stroke="#7A9E8A" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
    <text x="${W-PAD-2}" y="${(yObj-4).toFixed(1)}" font-size="8" fill="#7A9E8A" text-anchor="end" font-family="DM Sans,sans-serif">${tw.objectif} kg</text>
    <path d="${pathD}" stroke="#C4714A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map((e,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(e.poids).toFixed(1)}" r="4" fill="white" stroke="#C4714A" stroke-width="2"/>`).join('')}
    <text x="${x(pts.length-1).toFixed(1)}" y="${(y(pts[pts.length-1].poids)-9).toFixed(1)}"
      font-size="9" fill="#5C5650" text-anchor="middle" font-family="DM Sans,sans-serif" font-weight="500">
      ${pts[pts.length-1].poids.toFixed(1)} kg
    </text>
  </svg>`;
}

function todayKey(){const d=new Date();d.setHours(12,0,0,0);return d.toISOString().slice(0,10);}
function weekKey(){const d=new Date();d.setHours(12,0,0,0);const diff=d.getDay()===0?-6:1-d.getDay();d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);}
function weekLabel(k){return new Date(k+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});}
function daysLeft(){
  const tw = getTweaks();
  const parts = tw.dateTarget.split(' ');
  const months = {janvier:0,février:1,mars:2,avril:3,mai:4,juin:5,juillet:6,août:7,septembre:8,octobre:9,novembre:10,décembre:11};
  const d = parts.length===3 ? new Date(parseInt(parts[2]), months[parts[1].toLowerCase()]||6, parseInt(parts[0])) : new Date('2026-07-27');
  return Math.max(0, Math.ceil((d - new Date()) / 86400000));
}

async function askClaude(msgs){
  const tw=getTweaks();
  const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:`Tu es le coach santé de Sylvain. Profil : 55 ans, 174 cm, départ ${tw.depart} kg, objectif ${tw.objectif} kg. Régime méditerranéen-protéiné : ${tw.kcalObj} kcal/j, ${tw.protObj}g protéines minimum. Sous Kardégic. Festin le vendredi soir. Actif : 5 000 à 10 000 pas/jour. Réponds en français, ton direct et bienveillant, concis (8 lignes max sauf si demande détaillée). Pas de mise en garde médicale répétée.`,messages:msgs})});
  const d=await res.json();if(!res.ok)throw new Error(d.error||'Erreur API');
  return d.content.find(x=>x.type==='text')?.text||'';
}

async function sendChat(text){
  if(!text.trim()||chatLoading)return;
  chatHistory.push({role:'user',content:text.trim()});
  chatLoading=true;renderView(1);scrollChatBottom();
  const t=totals();const items=todayItems();
  const ctx=items.length?`\n[Journal : ${items.map(x=>getName(x)).join(', ')} — ${t.k} kcal, ${t.p}g prot]`:'';
  const msgs=chatHistory.map((m,i)=>i===0&&items.length?{role:m.role,content:m.content+ctx}:m);

    <div class="card-label">Progression</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:11px;color:var(--ink3);font-weight:300">${tw.depart} kg</span>
      <span style="font-size:12px;font-weight:500;color:var(--ink)">${pct}%</span>
      <span style="font-size:11px;color:var(--sage);font-weight:300">${tw.objectif} kg</span>
    </div>
    <div style="height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:16px">
      <div style="height:100%;width:${pct}%;background:linear-gradient(to right,var(--accent),var(--accent-mid));border-radius:4px;transition:width 0.6s ease"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div style="background:var(--surface2);border-radius:var(--r-sm);padding:14px;text-align:center">
        <div style="font-family:Playfair Display,serif;font-size:28px;font-weight:400;color:var(--ink)">${daysLeft()}</div>
        <div style="font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-top:4px">Jours restants</div>
      </div>
      <div style="background:var(--surface2);border-radius:var(--r-sm);padding:14px;text-align:center">
        <div style="font-family:Playfair Display,serif;font-size:28px;font-weight:400;color:var(--ink)">${avg!==null?avg:'—'}</div>
        <div style="font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-top:4px">kg / semaine</div>
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:12px"><div class="card-label">Historique</div>${rows}</div>
  <div class="spacer"></div>`;
}

/* ── RENDER ── */
const VIEW_LABELS = ['Journal','Coach IA','Plan repas','Pesée','Mon bilan'];
const VIEW_SUBS   = ['repas · humeur · IA', 'questions & conseils', 'semaine type', 'pesée hebdo', 'progression'];

function renderView(idx) {
  const pane = $(`pane-${VIEWS[idx]}`);
  if (!pane) return;
  const tw = getTweaks();
  if (tw.compact) document.getElementById('app').classList.add('compact');
  else document.getElementById('app').classList.remove('compact');
  const V = [vJournal, vCoach, vRepas, vPesee, vBilan];
  pane.innerHTML = (V[idx] || vJournal)();
}

function render() {
  $('pg-title').textContent = VIEW_LABELS[currentView] || 'Santé';
  $('pg-sub').textContent   = VIEW_SUBS[currentView] || '';
  for (let i = 0; i < 5; i++) renderView(i);
  // position slider
  $('view-slider').style.transform = `translateX(-${currentView * 100}%)`;
}

/* ── NAVIGATION ── */
function goTo(idx) {
  const prev = currentView;
  currentView = idx;
  // re-render destination pane
  renderView(idx);
  // slide
  $('view-slider').style.transform = `translateX(-${idx * 100}%)`;
  // update header
  $('pg-title').textContent = VIEW_LABELS[idx];
  $('pg-sub').textContent   = VIEW_SUBS[idx];
  // nav highlight
  document.querySelectorAll('nav button').forEach((b,i) => b.classList.toggle('active', i===idx));
  // scroll top new pane
  const pane = $(`pane-${VIEWS[idx]}`);
  if (pane) pane.scrollTop = 0;
  if (idx === 1) scrollChatBottom();
  journalAi = '';
}

function setDay(i) { dayIdx=i; renderView(2); }
function setPas(v)  { form.pas=v; renderView(3); }

function refreshBalance(val) {
  const c = $('balance-container');
  if (c) c.innerHTML = svgBalanceDial(val);
}

/* ── HANDLERS ── */
function handleJournalAdd(){
  const el=$('journal-input');if(!el||!el.value.trim())return;
  const text=el.value.trim();addJournalEntry(text);el.value='';enrichWithAI(text);
}
async function enrichWithAI(text){
  renderView(0);
  try{
    const reply=await askClaude([{role:'user',content:`Estime les macros pour : "${text}". Réponds UNIQUEMENT en JSON sans markdown : {"kcal":0,"prot":0,"gluc":0,"lip":0}.`}]);
    const macros=JSON.parse(reply.replace(/```json|```/g,'').trim());
    const k=todayKey();
    if(journal[k]?.length>0){const last=journal[k][journal[k].length-1];last.kcal=macros.kcal||0;last.prot=macros.prot||0;last.gluc=macros.gluc||0;last.lip=macros.lip||0;await saveJournal();}
  }catch(e){}
  renderView(0);
}

function handleChat(){
  const el=$('chat-input');if(!el)return;
  const text=el.value.trim();if(!text)return;
  el.value='';el.style.height='auto';sendChat(text);
}
function setPoids(v){form.poids=v;}
function setNote(v){form.note=v;}

Object.assign(window,{goTo,setDay,setPas,submitForm,removeFood,analyseJournal,handleJournalAdd,handleChat,setPoids,setNote,refreshBalance,$});
Object.defineProperty(window,'form',{get(){return form;},set(v){form=v;}});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey&&document.activeElement?.id==='chat-input'){e.preventDefault();handleChat();}
});
document.addEventListener('input',e=>{
  if(e.target?.id==='chat-input'){e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,100)+'px';}
});

/* ── BOOT ── */
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

// Show loading
$('pane-journal').innerHTML=`<div class="empty" style="padding-top:80px"><div style="font-family:Playfair Display,serif;font-size:48px;font-weight:300;color:var(--surface2)">…</div></div>`;

try{await signInAnonymously(auth);fb=true;$('fb-dot').classList.remove('offline');}catch(e){fb=false;}
await loadEntries();await loadJournal();
render();
</script>
</body>
</html>
