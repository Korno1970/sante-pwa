<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Santé">
<link rel="manifest" href="./manifest.json">
<title>Suivi Santé</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232736;
  --border: rgba(255,255,255,0.07);
  --text: #e8eaf0;
  --muted: #6b7280;
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.1);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.1);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }

#app {
  max-width: 480px; margin: 0 auto;
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  padding: calc(14px + var(--safe-top)) 20px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.header-left p { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; font-weight: 300; }
.header-badge {
  font-size: 11px; font-family: 'DM Mono', monospace;
  background: var(--green-dim); color: var(--green);
  padding: 4px 10px; border-radius: 20px; font-weight: 400;
}
.header-badge.offline { background: var(--amber-dim); color: var(--amber); }

/* SCROLL */
.scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* NAV */
nav {
  flex-shrink: 0;
  display: flex; background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
}
nav button {
  flex: 1; background: none; border: none; cursor: pointer;
  padding: 12px 4px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase;
  transition: color 0.15s;
}
nav button.active { color: var(--green); }
nav button .ico { font-size: 18px; line-height: 1; }

/* CARDS */
.card {
  background: var(--surface); border-radius: 16px;
  margin: 14px 14px 0; padding: 18px;
  border: 1px solid var(--border);
}
.card-label {
  font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 400;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.spacer { height: 14px; }

/* RING */
.ring-wrap { display: flex; align-items: center; gap: 20px; }
.poids-big { font-size: 42px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
.poids-unit { font-size: 16px; color: var(--muted); font-weight: 600; }
.poids-delta { font-size: 12px; font-family: 'DM Mono', monospace; margin-top: 6px; }
.poids-delta.good { color: var(--green); }
.poids-delta.bad { color: var(--red); }
.poids-delta.neutral { color: var(--muted); }

/* STATS GRID */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 14px 0; }
.stat-card { background: var(--surface); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
.stat-val { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
.stat-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 4px; }

/* BILAN BAR */
.bilan-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 14px 0; }
.bilan-cell { background: var(--surface); border-radius: 10px; padding: 10px 6px; text-align: center; border: 1px solid var(--border); }
.bilan-val { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
.bilan-label { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 3px; letter-spacing: 0.05em; }
.bilan-val.ok { color: var(--green); }
.bilan-val.over { color: var(--red); }

/* ALERT BOX */
.alert { margin: 10px 14px 0; border-radius: 12px; padding: 12px 14px; font-size: 12px; font-family: 'DM Mono', monospace; line-height: 1.5; }
.alert.green { background: var(--green-dim); color: var(--green); }
.alert.amber { background: var(--amber-dim); color: var(--amber); }
.alert.red { background: var(--red-dim); color: var(--red); }

/* FORM */
label.lbl { display: block; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
input[type=number], input[type=text], textarea {
  width: 100%; padding: 12px 14px; font-size: 16px;
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--surface2); color: var(--text);
  font-family: 'Syne', sans-serif; outline: none; margin-bottom: 14px;
  -webkit-appearance: none;
}
input[type=number]:focus, input[type=text]:focus, textarea:focus {
  border-color: rgba(74,222,128,0.4);
}
textarea { resize: none; line-height: 1.5; }
input[type=range] { width: 100%; accent-color: var(--green); margin-bottom: 0; }
.slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.dots { display: flex; gap: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.on { background: var(--green); }
.dot.deep { background: var(--blue); }

.pas-row { display: flex; gap: 8px; margin-bottom: 14px; }
.pas-btn { flex: 1; padding: 10px 4px; font-size: 11px; font-family: 'DM Mono', monospace; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.pas-btn.low  { border-color: var(--red);   background: var(--red-dim);   color: var(--red);   font-weight: 500; }
.pas-btn.mid  { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); font-weight: 500; }
.pas-btn.high { border-color: var(--green); background: var(--green-dim); color: var(--green); font-weight: 500; }

/* BUTTONS */
.btn { width: 100%; padding: 14px; font-size: 14px; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0.05em; border: none; border-radius: 12px; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; text-transform: uppercase; }
.btn:active { opacity: 0.75; }
.btn-green { background: var(--green); color: #0f1117; }
.btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-blue  { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }

/* HISTORIQUE */
.hist-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.hist-item:last-child { border-bottom: none; }
.hist-top { display: flex; justify-content: space-between; align-items: flex-start; }
.hist-date { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
.hist-poids { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-top: 2px; }
.chip { font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.chip-green { background: var(--green-dim); color: var(--green); }
.chip-red   { background: var(--red-dim);   color: var(--red); }
.chip-gray  { background: var(--surface2);  color: var(--muted); }
.hist-meta { display: flex; gap: 10px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.hist-note { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 6px; font-style: italic; line-height: 1.5; }

/* PLAN REPAS */
.day-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 0 14px; margin-top: 14px; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab { flex: 0 0 auto; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.day-tab.active { background: var(--green-dim); color: var(--green); border-color: rgba(74,222,128,0.3); }
.meal-card { background: var(--surface); border-radius: 14px; margin: 8px 14px 0; border: 1px solid var(--border); padding: 14px 16px; }
.meal-time { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
.meal-name { font-size: 15px; font-weight: 700; margin: 4px 0 3px; }
.meal-kcal { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--green); }
.meal-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 4px; }

/* JOURNAL */
.log-item { background: var(--surface); border-radius: 10px; padding: 11px 14px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; }
.log-name { font-size: 13px; font-weight: 600; }
.log-detail { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 3px; }
.log-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 0 0 6px; flex-shrink: 0; line-height: 1; }

/* IA */
.ai-box { margin: 10px 14px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.ai-head { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 10px; font-family: 'DM Mono', monospace; color: var(--green); letter-spacing: 0.1em; text-transform: uppercase; }
.ai-body { padding: 14px; font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
.ai-body.ai-loading { color: var(--muted); font-style: italic; }

/* CHAT */
.chat-wrap { padding: 0 14px 90px; }
.chat-msg { margin-bottom: 10px; display: flex; }
.chat-msg.user { justify-content: flex-end; }
.chat-msg.ai { justify-content: flex-start; }
.bubble {
  max-width: 85%; padding: 12px 14px;
  border-radius: 14px; font-size: 13px; line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
}
.chat-msg.user .bubble { background: var(--green); color: #0f1117; font-weight: 600; }
.chat-msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.chat-msg.ai.loading .bubble { color: var(--muted); font-style: italic; }
.chat-input-wrap {
  position: sticky; bottom: 0; padding: 10px 14px calc(10px + var(--safe-bottom));
  background: linear-gradient(to top, var(--bg) 70%, rgba(15,17,23,0));
  display: flex; gap: 8px; align-items: flex-end;
}
.chat-input {
  flex: 1; min-height: 46px; max-height: 120px;
  border-radius: 12px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text);
  padding: 12px 14px; font-size: 14px; font-family: 'Syne', sans-serif;
  resize: none; outline: none;
}
.chat-send {
  width: 46px; height: 46px; border-radius: 12px; border: none;
  background: var(--green); color: #0f1117; font-size: 18px; font-weight: 800;
  cursor: pointer; flex-shrink: 0;
}

/* EMPTY */
.empty {
  margin: 16px 14px 0; padding: 28px 20px;
  text-align: center; color: var(--muted); font-size: 13px; line-height: 1.7;
  border: 1px dashed var(--border); border-radius: 14px;
}

/* SVG RING */
svg { display: block; }
.ring-txt { font-family: 'DM Mono', monospace; font-size: 12px; fill: var(--muted); }

/* DESKTOP */
@media (min-width: 700px) {
  #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══ CONFIG ═══
const DEPART = 94;
const OBJECTIF = 84;
const DEADLINE = '2026-07-27';
const KCAL_OBJ = 1550;
const PROT_OBJ = 90;

// ═══ STORAGE / DATA ═══
let state = {
  tab: 'historique',
  dayIdx: new Date().getDay() === 0 ? 6 : new Date().getDay() - 1,
  entries: load('sante_entries', []),
  foods: load('sante_foods', []),
  form: { poids: '', moral: 3, plan: 3, pas: 'mid', note: '' },
  chatHistory: [],
  chatLoading: false,
  journalAi: ''
};

const DAYS = [
  { nom: 'Lundi', meals: [
    { t:'Petit-déjeuner', n:'Skyr, fruits rouges, graines de chia', k:320, d:'Riche en protéines, fibres et faible index glycémique.' },
    { t:'Déjeuner', n:'Poulet grillé, quinoa, brocoli', k:520, d:'Repas complet, protéines maigres et glucides modérés.' },
    { t:'Dîner', n:'Omelette légumes, salade, yaourt grec', k:430, d:'Léger mais rassasiant, parfait pour le soir.' }
  ]},
  { nom: 'Mardi', meals: [
    { t:'Petit-déjeuner', n:'Œufs brouillés, pain complet, kiwi', k:350, d:'Bon apport en protéines et micronutriments.' },
    { t:'Déjeuner', n:'Saumon, haricots verts, patate douce', k:560, d:'Oméga-3, fibres et énergie stable.' },
    { t:'Dîner', n:'Soupe maison, jambon blanc, fromage blanc', k:390, d:'Simple, digeste et protéiné.' }
  ]},
  { nom: 'Mercredi', meals: [
    { t:'Petit-déjeuner', n:'Fromage blanc, flocons d’avoine, pomme', k:330, d:'Petit-déjeuner rassasiant et équilibré.' },
    { t:'Déjeuner', n:'Dinde, riz complet, courgettes', k:510, d:'Base propre pour tenir l’après-midi.' },
    { t:'Dîner', n:'Cabillaud, ratatouille, lentilles', k:450, d:'Protéines + fibres pour la satiété.' }
  ]},
  { nom: 'Jeudi', meals: [
    { t:'Petit-déjeuner', n:'Skyr, banane, amandes', k:340, d:'Simple, rapide, efficace.' },
    { t:'Déjeuner', n:'Steak haché 5%, pois chiches, crudités', k:540, d:'Bonne densité protéique, glucides modérés.' },
    { t:'Dîner', n:'Salade thon-œuf-tomate, soupe', k:400, d:'Léger et suffisant pour le soir.' }
  ]},
  { nom: 'Vendredi', meals: [
    { t:'Petit-déjeuner', n:'Yaourt grec, poire, noix', k:320, d:'Bonne base avant une journée plus libre.' },
    { t:'Déjeuner', n:'Poulet, légumes grillés, semoule', k:500, d:'On garde la ligne avant le repas festif.' },
    { t:'Dîner', n:'Repas festif maîtrisé', k:700, d:'Profite, mais ralentis, choisis, savoure, sans te resservir.' }
  ]},
  { nom: 'Samedi', meals: [
    { t:'Petit-déjeuner', n:'Omelette, fruit, café', k:300, d:'Après vendredi, on repart proprement.' },
    { t:'Déjeuner', n:'Poisson, légumes, riz', k:500, d:'Repas de rééquilibrage.' },
    { t:'Dîner', n:'Soupe, blanc de poulet, yaourt', k:380, d:'Sobre, digeste, utile.' }
  ]},
  { nom: 'Dimanche', meals: [
    { t:'Petit-déjeuner', n:'Skyr, fruits, graines', k:310, d:'Routine simple et efficace.' },
    { t:'Déjeuner', n:'Rôti maigre, légumes, pommes vapeur', k:560, d:'Repas familial sans excès.' },
    { t:'Dîner', n:'Salade complète, fromage blanc', k:390, d:'On finit léger avant lundi.' }
  ]}
];

// ═══ HELPERS ═══
function $(sel){ return document.querySelector(sel); }
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function load(k, def){ try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } }
function save(k, v){ localStorage.setItem(k, JSON.stringify(v)); }
function fmt1(n){ return (+n).toFixed(1).replace('.', ','); }
function todayISO(){ return new Date().toISOString().slice(0,10); }

function weekKey(d = new Date()) {
  const x = new Date(d);
  const day = x.getDay() || 7;
  x.setHours(0,0,0,0);
  x.setDate(x.getDate() + 4 - day);
  const yearStart = new Date(x.getFullYear(), 0, 1);
  const weekNo = Math.ceil((((x - yearStart) / 86400000) + 1) / 7);
  return `${x.getFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}
function weekLabel(k){
  const [y,w] = k.split('-W');
  return `Semaine ${w} · ${y}`;
}
function saveEntry(entry){ save('sante_entries', state.entries); }
function saveFoods(){ save('sante_foods', state.foods); }

function lastEntry(){ return state.entries[0] || null; }
function prevEntry(){ return state.entries[1] || null; }

function totalLost() {
  const e = lastEntry();
  return e ? +(DEPART - e.poids).toFixed(1) : 0;
}
function weeksLeft() {
  const today = new Date();
  const end = new Date(DEADLINE + 'T00:00:00');
  return Math.max(0, Math.ceil((end - today) / 604800000));
}
function neededPerWeek() {
  const e = lastEntry();
  if (!e) return +(((DEPART - OBJECTIF) / Math.max(1, weeksLeft()))).toFixed(2);
  const restant = e.poids - OBJECTIF;
  return +((restant / Math.max(1, weeksLeft()))).toFixed(2);
}
function avgPerWeek() {
  if (state.entries.length < 2) return 0;
  const oldest = state.entries[state.entries.length - 1];
  const newest = state.entries[0];
  const days = Math.max(1, (new Date(newest.key) - new Date(oldest.key)) / 86400000);
  return +(((oldest.poids - newest.poids) / days) * 7).toFixed(2);
}
function adherenceScore(e) {
  return Math.round((((e.plan || 0) + (e.moral || 0)) / 10) * 100);
}
function trendDelta() {
  const e0 = lastEntry(), e1 = prevEntry();
  return (!e0 || !e1) ? null : +(e0.poids - e1.poids).toFixed(1);
}
function progressPct() {
  const e = lastEntry();
  if (!e) return 0;
  return Math.max(0, Math.min(100, Math.round(((DEPART - e.poids) / (DEPART - OBJECTIF)) * 100)));
}
function ringSvg(pct) {
  const r = 44, c = 2 * Math.PI * r, val = c * (1 - pct / 100);
  return `
  <svg width="110" height="110" viewBox="0 0 110 110" aria-hidden="true">
    <circle cx="55" cy="55" r="${r}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="10"/>
    <circle cx="55" cy="55" r="${r}" fill="none" stroke="#4ade80" stroke-width="10"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${val}"
      transform="rotate(-90 55 55)"/>
    <text x="55" y="51" text-anchor="middle" style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;fill:#e8eaf0">${pct}%</text>
    <text x="55" y="69" text-anchor="middle" class="ring-txt">objectif</text>
  </svg>`;
}

// ═══ NUTRITION PARSING ═══
function estimateFood(text) {
  const t = text.toLowerCase();

  const refs = [
    { keys:['skyr'], n:'Skyr', k:100, p:17, g:4, l:0 },
    { keys:['yaourt grec','greek yogurt'], n:'Yaourt grec', k:130, p:12, g:4, l:6 },
    { keys:['fromage blanc'], n:'Fromage blanc', k:90, p:8, g:4, l:3 },
    { keys:['oeuf','œuf','omelette'], n:'Œufs / omelette', k:180, p:14, g:2, l:12 },
    { keys:['poulet','dinde'], n:'Poulet / dinde', k:220, p:35, g:0, l:8 },
    { keys:['saumon'], n:'Saumon', k:280, p:25, g:0, l:18 },
    { keys:['thon'], n:'Thon', k:170, p:28, g:0, l:5 },
    { keys:['cabillaud','poisson'], n:'Poisson', k:190, p:28, g:0, l:7 },
    { keys:['riz'], n:'Riz', k:210, p:4, g:44, l:1 },
    { keys:['quinoa'], n:'Quinoa', k:220, p:8, g:38, l:4 },
    { keys:['pâtes','pates'], n:'Pâtes', k:250, p:8, g:48, l:3 },
    { keys:['pain'], n:'Pain', k:160, p:5, g:30, l:2 },
    { keys:['lentilles','pois chiches'], n:'Légumineuses', k:210, p:11, g:30, l:4 },
    { keys:['banane'], n:'Banane', k:105, p:1, g:24, l:0 },
    { keys:['pomme','poire','kiwi','fruit','fruits rouges'], n:'Fruit', k:80, p:1, g:18, l:0 },
    { keys:['amandes','noix','graines'], n:'Oléagineux / graines', k:170, p:5, g:5, l:14 },
    { keys:['brocoli','courgettes','ratatouille','légumes','salade','crudités','épinards'], n:'Légumes', k:60, p:3, g:10, l:1 },
    { keys:['soupe'], n:'Soupe', k:120, p:4, g:15, l:4 },
    { keys:['pizza'], n:'Pizza', k:800, p:30, g:90, l:35 },
    { keys:['burger'], n:'Burger', k:750, p:28, g:55, l:45 },
    { keys:['frite','frites'], n:'Frites', k:450, p:5, g:50, l:24 },
    { keys:['gâteau','gateau','dessert'], n:'Dessert', k:300, p:4, g:38, l:14 },
    { keys:['vin','alcool','bière','biere'], n:'Alcool', k:180, p:0, g:5, l:0 }
  ];

  let found = refs.filter(r => r.keys.some(k => t.includes(k)));
  if (!found.length) {
    return { name:text.trim(), kcal:350, prot:18, gluc:25, lip:14 };
  }
  const kcal = found.reduce((s,x)=>s+x.k,0);
  const prot = found.reduce((s,x)=>s+x.p,0);
  const gluc = found.reduce((s,x)=>s+x.g,0);
  const lip  = found.reduce((s,x)=>s+x.l,0);
  return { name:text.trim(), kcal, prot, gluc, lip };
}

function todayItems() {
  const d = todayISO();
  return state.foods.filter(x => x.date === d);
}
function totals() {
  const items = todayItems();
  return items.reduce((a,x) => ({
    k: a.k + x.kcal,
    p: a.p + x.prot,
    g: a.g + x.gluc,
    l: a.l + x.lip
  }), { k:0, p:0, g:0, l:0 });
}

// ═══ ACTIONS ═══
function goTo(tab){ state.tab = tab; render(); }
function setDay(i){ state.dayIdx = i; render(); }
function setPoids(v){ state.form.poids = v; }
function setPas(v){ state.form.pas = v; render(); }
function setNote(v){ state.form.note = v; }
function updateDots() {
  const a = document.getElementById('dots-moral');
  const b = document.getElementById('dots-plan');
  if (a) a.innerHTML = dots(state.form.moral,'on');
  if (b) b.innerHTML = dots(state.form.plan,'deep');
}
function dots(n, cls='on'){
  return `<div class="dots">${Array.from({length:5}, (_,i)=>`<div class="dot ${i<n?cls:''}"></div>`).join('')}</div>`;
}

function addFood(text) {
  const e = estimateFood(text);
  state.foods.unshift({
    id: Date.now(),
    date: todayISO(),
    name: e.name,
    kcal: e.kcal,
    prot: e.prot,
    gluc: e.gluc,
    lip: e.lip
  });
  saveFoods();
  render();
}
function removeFood(id) {
  state.foods = state.foods.filter(x => x.id !== id);
  saveFoods();
  render();
}
function handleJournalAdd() {
  const ta = document.getElementById('journal-input');
  const txt = ta.value.trim();
  if (!txt) return;
  addFood(txt);
  ta.value = '';
}

async function handleChat() {
  const ta = document.getElementById('chat-input');
  const txt = ta.value.trim();
  if (!txt) return;
  ta.value = '';
  await sendChat(txt);
}

// ═══ IA CLAUDE ═══
async function askClaude(msgs) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 800,
      system: `Tu es le coach santé de Sylvain. Profil : 55 ans, 174cm, départ 94kg, objectif 84kg au 27 juillet 2026. Régime méditerranéen-protéiné : 1400-1600 kcal/j, 90g protéines minimum. Sous Kardégic. Festin le vendredi soir. Actif : 5000 à 10000 pas/jour. Réponds en français, ton direct et bienveillant, concis (8 lignes max sauf si demande détaillée). Pas de mise en garde médicale répétée.`,
      messages: msgs
    })
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error || 'Erreur API');
  return d.content.find(x => x.type==='text')?.text || '';
}

async function analyseJournal() {
  const items = todayItems();
  if (!items.length) { alert('Ajoute d’abord des repas dans le journal.'); return; }
  state.journalAi = 'Analyse en cours...';
  render();
  const t = totals();
  const liste = items.map(x => x.name + (x.kcal ? ' (' + x.kcal + ' kcal)' : '')).join(', ');
  try {
    state.journalAi = await askClaude([{ role: 'user', content:
      `Analyse mon journal du jour.\nAliments : ${liste}\nTotaux : ${t.k} kcal, ${t.p}g prot, ${t.g}g gluc, ${t.l}g lip.\nObjectifs : ${KCAL_OBJ} kcal, ${PROT_OBJ}g prot.\nDonne : qualité globale, point fort, point à corriger, un ajustement concret.`
    }]);
  } catch(err) { state.journalAi = 'Erreur : ' + err.message; }
  render();
}

async function sendChat(text) {
  if (!text.trim() || state.chatLoading) return;
  state.chatHistory.push({ role: 'user', content: text.trim() });
  state.chatLoading = true;
  render();
  scrollChatBottom();
  const t = totals();
  const items = todayItems();
  const context = items.length
    ? `\n[Contexte : journal du jour = ${items.map(x=>x.name).join(', ')} — ${t.k} kcal, ${t.p}g prot]`
    : '';
  const msgs = state.chatHistory.map((m,i) => i === 0 && items.length
    ? { role: m.role, content: m.content + context }
    : m
  );
  try {
    const reply = await askClaude(msgs);
    state.chatHistory.push({ role: 'assistant', content: reply });
  } catch(err) {
    state.chatHistory.push({ role: 'assistant', content: 'Erreur : ' + err.message });
  }
  state.chatLoading = false;
  render();
  scrollChatBottom();
}

function scrollChatBottom() {
  setTimeout(() => {
    const main = document.querySelector('.scroll');
    if (main) main.scrollTop = main.scrollHeight;
  }, 50);
}

// ═══ PESÉE ═══
function normalizeWeightInput(value) {
  return String(value ?? '').trim().replace(/\s+/g, '').replace(',', '.');
}

function parseWeightKg(value) {
  const normalized = normalizeWeightInput(value);
  if (!normalized || !/^\d+(?:\.\d+)?$/.test(normalized)) return NaN;
  return Number(normalized);
}

function formatWeightForInput(value) {
  const weight = parseWeightKg(value);
  return Number.isFinite(weight) ? weight.toFixed(1).replace('.', ',') : String(value ?? '').trim();
}

function submitForm() {
  const inputEl = document.getElementById('input-poids');
  const rawVal = inputEl ? inputEl.value : state.form.poids;
  const p = parseWeightKg(rawVal);

  if (!Number.isFinite(p) || p < 40 || p > 250) {
    alert('Saisis un poids valide en kilos, par exemple 84,2 ou 84.2.');
    return;
  }

  const k = weekKey();
  state.entries = [
    { key: k, poids: p, moral: state.form.moral, plan: state.form.plan, pas: state.form.pas, note: state.form.note.trim() },
    ...state.entries.filter(e => e.key !== k)
  ].sort((a,b) => b.key.localeCompare(a.key));

  saveEntry(state.entries[0]);
  state.form = { poids: '', moral: 3, plan: 3, pas: 'mid', note: '' };
  goTo('historique');
}

// ═══ VUES ═══
function vJournal() {
  const t = totals();
  const items = todayItems();
  const kcalOk = t.k <= KCAL_OBJ;
  const protOk = t.p >= PROT_OBJ;

  const bilanBar = `<div class="bilan-grid">
    <div class="bilan-cell"><div class="bilan-val ${kcalOk?'ok':'over'}">${t.k}</div><div class="bilan-label">kcal</div></div>
    <div class="bilan-cell"><div class="bilan-val ${protOk?'ok':'over'}">${t.p}g</div><div class="bilan-label">prot</div></div>
    <div class="bilan-cell"><div class="bilan-val">${t.g}g</div><div class="bilan-label">gluc</div></div>
    <div class="bilan-cell"><div class="bilan-val">${t.l}g</div><div class="bilan-label">lip</div></div>
  </div>`;

  const alertMsg = t.k === 0
    ? '<div class="alert green">Objectif : ' + KCAL_OBJ + ' kcal · ' + PROT_OBJ + 'g de protéines</div>'
    : t.k > KCAL_OBJ
    ? '<div class="alert red">+' + (t.k - KCAL_OBJ) + ' kcal au-dessus de l’objectif</div>'
    : '<div class="alert green">' + (KCAL_OBJ - t.k) + ' kcal restantes</div>';

  const saisie = `<div class="card" style="margin-top:14px">
    <div class="card-label">Saisie du repas</div>
    <textarea id="journal-input" rows="3" placeholder="Décris ce que tu as mangé… Ex. : bol de quinoa avec saumon grillé et épinards" style="margin-bottom:8px"></textarea>
    <button class="btn btn-green" onclick="handleJournalAdd()">Ajouter au journal</button>
  </div>`;

  const logHtml = items.length
    ? '<div style="margin:10px 14px 0">' + items.map(x =>
        `<div class="log-item">
          <div>
            <div class="log-name">${esc(x.name)}</div>
            <div class="log-detail">${x.kcal ? x.kcal + ' kcal · ' : ''}${x.prot ? x.prot + 'g de prot' : ''}</div>
          </div>
          <button class="log-del" onclick="removeFood(${x.id})">×</button>
        </div>`
      ).join('') + '</div>'
    : '<div class="empty">Aucun repas enregistré aujourd’hui.<br>Décris ce que tu as mangé ci-dessus.</div>';

  const aiSection = state.journalAi
    ? `<div class="ai-box"><div class="ai-head">Analyse du jour</div><div class="ai-body${state.journalAi==='Analyse en cours...'?' ai-loading':''}">${esc(state.journalAi)}</div></div>`
    : '';

  const aiBtn = items.length
    ? '<div style="margin:10px 14px 0"><button class="btn btn-blue" onclick="analyseJournal()">Analyser ma journée avec l’IA</button></div>'
    : '';

  return bilanBar + alertMsg + saisie + logHtml + aiBtn + aiSection + '<div class="spacer"></div>';
}

function vCoach() {
  const msgs = state.chatHistory.map((m,i) => {
    const isLast = i === state.chatHistory.length - 1;
    const loading = isLast && state.chatLoading && m.role === 'user';
    const cls = m.role === 'user' ? 'user' : ('ai' + (loading ? ' loading' : ''));
    return `<div class="chat-msg ${cls}"><div class="bubble">${esc(m.content)}${loading ? '<br><br>...' : ''}</div></div>`;
  }).join('');

  const empty = !state.chatHistory.length
    ? `<div class="empty" style="padding-top:30px">
        Pose-moi une question sur ton régime,<br>tes repas, tes progrès…<br><br>
        <span style="font-size:24px">🤖</span>
      </div>`
    : '';

  return `<div style="padding-top:14px">
    <div class="chat-wrap">${empty}${msgs}</div>
    <div class="chat-input-wrap" id="chat-input-wrap">
      <textarea class="chat-input" id="chat-input" rows="1" placeholder="Ta question…"></textarea>
      <button class="chat-send" onclick="handleChat()">↑</button>
    </div>
  </div>`;
}

function vRepas() {
  const d = DAYS[state.dayIdx];
  const tabs = DAYS.map((x,i) =>
    `<button class="day-tab${i===state.dayIdx?' active':''}" onclick="setDay(${i})">${x.nom}</button>`
  ).join('');
  const meals = d.meals.map(m =>
    `<div class="meal-card">
      <div class="meal-time">${m.t}</div>
      <div class="meal-name">${m.n}</div>
      <div class="meal-kcal">${m.k} kcal</div>
      <div class="meal-desc">${m.d}</div>
    </div>`
  ).join('');
  return `<div class="day-tabs">${tabs}</div>${meals}<div class="spacer"></div>`;
}

function vPesee() {
  return `<div class="card">
    <div class="card-label">Pesée · ${weekLabel(weekKey())}</div>
    <label class="lbl">Poids de la pesée (kg)</label>
    <input type="text" id="input-poids" inputmode="decimal" autocomplete="off" placeholder="Ex. : 84,2 ou 84.2" value="${esc(state.form.poids)}" oninput="setPoids(this.value)">
    <label class="lbl">Moral</label>
    <div class="slider-row">
      <input type="range" min="1" max="5" step="1" value="${state.form.moral}" oninput="state.form.moral=+this.value;updateDots()">
      <div id="dots-moral">${dots(state.form.moral,'on')}</div>
    </div>
    <label class="lbl">Tenue du plan</label>
    <div class="slider-row">
      <input type="range" min="1" max="5" step="1" value="${state.form.plan}" oninput="state.form.plan=+this.value;updateDots()">
      <div id="dots-plan">${dots(state.form.plan,'deep')}</div>
    </div>
    <label class="lbl">Activité</label>
    <div class="pas-row">
      <button class="pas-btn${state.form.pas==='low'?' low':''}" onclick="setPas('low')">< 5 000</button>
      <button class="pas-btn${state.form.pas==='mid'?' mid':''}" onclick="setPas('mid')">5–10k</button>
      <button class="pas-btn${state.form.pas==='high'?' high':''}" onclick="setPas('high')">> 10 000</button>
    </div>
    <label class="lbl">Note libre</label>
    <textarea rows="3" placeholder="Bonne semaine, faim OK…" oninput="setNote(this.value)">${esc(state.form.note)}</textarea>
    <button class="btn btn-green" onclick="submitForm()">Enregistrer la pesée</button>
  </div><div class="spacer"></div>`;
}

function vHistorique() {
  if (!state.entries.length) return '<div class="empty">Aucune pesée enregistrée.<br>Va dans l’onglet Pesée pour commencer.</div>';

  const e0 = state.entries[0], prev = state.entries[1];
  const pct = Math.max(0, Math.min(100, Math.round((DEPART - e0.poids) / (DEPART - OBJECTIF) * 100)));
  const delta = prev ? e0.poids - prev.poids : null;
  const avg = state.entries.length < 2 ? 0 : (() => {
    const o = state.entries[state.entries.length-1], n = state.entries[0];
    const d = (new Date(n.key) - new Date(o.key)) / 86400000;
    return d > 0 ? +((o.poids - n.poids) / d * 7).toFixed(2) : 0;
  })();

  const deltaHtml =
    delta === null
      ? `<div class="poids-delta neutral">Première pesée enregistrée</div>`
      : delta < 0
      ? `<div class="poids-delta good">${fmt1(Math.abs(delta))} kg depuis la dernière pesée</div>`
      : delta > 0
      ? `<div class="poids-delta bad">+${fmt1(delta)} kg depuis la dernière pesée</div>`
      : `<div class="poids-delta neutral">Stable depuis la dernière pesée</div>`;

  const top = `<div class="card">
    <div class="card-label">Vue d’ensemble</div>
    <div class="ring-wrap">
      ${ringSvg(pct)}
      <div>
        <div class="poids-big">${fmt1(e0.poids)} <span class="poids-unit">kg</span></div>
        ${deltaHtml}
      </div>
    </div>
  </div>`;

  const stats = `<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val">${fmt1(DEPART - e0.poids)}</div>
      <div class="stat-label">kg perdus</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${fmt1(e0.poids - OBJECTIF)}</div>
      <div class="stat-label">kg restants</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${fmt1(avg)}</div>
      <div class="stat-label">kg / semaine</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${weeksLeft()}</div>
      <div class="stat-label">semaines restantes</div>
    </div>
  </div>`;

  const summary = top + stats;

  const rows = state.entries.map(e => {
    const score = adherenceScore(e);
    const pasLabel = e.pas === 'high' ? '> 10 000 pas' : e.pas === 'mid' ? '5 000–10 000 pas' : '< 5 000 pas';
    const chip = score >= 70
      ? '<span class="chip chip-green">bonne semaine</span>'
      : score < 40
      ? '<span class="chip chip-red">à relancer</span>'
      : '<span class="chip chip-gray">moyenne</span>';

    return `<div class="hist-item">
      <div class="hist-top">
        <div>
          <div class="hist-date">${weekLabel(e.key)}</div>
          <div class="hist-poids">${fmt1(e.poids)} kg</div>
        </div>
        ${chip}
      </div>
      <div class="hist-meta">
        <span class="chip chip-gray">moral ${e.moral}/5</span>
        <span class="chip chip-gray">plan ${e.plan}/5</span>
        <span class="chip chip-gray">${pasLabel}</span>
      </div>
      ${e.note ? `<div class="hist-note">${esc(e.note)}</div>` : ''}
    </div>`;
  }).join('');

  return summary + '<div class="card" style="margin-top:14px"><div class="card-label">Historique des pesées</div>' + rows + '</div><div class="spacer"></div>';
}

// ═══ LAYOUT ═══
function headerTitle() {
  if (state.entries.length) {
    const current = state.entries[0].poids;
    return `
      <div class="header-left">
        <h1>Suivi Santé</h1>
        <p>${DEPART} → ${fmt1(current)} kg · ${new Date(DEADLINE).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' })}</p>
      </div>
      <div class="header-badge">local</div>
    `;
  }
  return `
    <div class="header-left">
      <h1>Suivi Santé</h1>
      <p>${DEPART} → ${OBJECTIF} kg · ${new Date(DEADLINE).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' })}</p>
    </div>
    <div class="header-badge offline">local</div>
  `;
}

function navHtml() {
  const items = [
    ['journal','Journal','📘'],
    ['coach','Coach IA','🤖'],
    ['repas','Repas','🍽️'],
    ['pesee','Pesée','⚖️'],
    ['historique','Bilan','📈']
  ];
  return `<nav>${items.map(([id,lab,ico]) =>
    `<button class="${state.tab===id?'active':''}" onclick="goTo('${id}')">
      <div class="ico">${ico}</div><div>${lab}</div>
    </button>`
  ).join('')}</nav>`;
}

function mainView() {
  switch(state.tab) {
    case 'journal': return vJournal();
    case 'coach': return vCoach();
    case 'repas': return vRepas();
    case 'pesee': return vPesee();
    default: return vHistorique();
  }
}

function bindAfterRender() {
  const chat = document.getElementById('chat-input');
  if (chat) {
    chat.addEventListener('keydown', async e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        await handleChat();
      }
    });
    chat.addEventListener('input', () => {
      chat.style.height = 'auto';
      chat.style.height = Math.min(chat.scrollHeight, 120) + 'px';
    });
  }

  const poidsInput = document.getElementById('input-poids');
  if (poidsInput) {
    poidsInput.addEventListener('blur', () => {
      const formatted = formatWeightForInput(poidsInput.value);
      if (formatted) {
        poidsInput.value = formatted;
        state.form.poids = formatted;
      }
    });
  }
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <header class="header">${headerTitle()}</header>
    <main class="scroll">${mainView()}</main>
    ${navHtml()}
  `;
  bindAfterRender();
  updateDots();
}

// ═══ INIT ═══
render();
</script>
