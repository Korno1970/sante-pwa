function safeLocalGet(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}

function safeLocalSet(key, value){
  try{
    localStorage.setItem(key, JSON.stringify(value));
  }catch(e){}
}

function escapeHtml(str=''){
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;');
}

function showLoader(msg){
  main.innerHTML = '<div class="empty" style="padding-top:60px"><div style="font-size:32px;margin-bottom:12px">⏳</div><div>'+escapeHtml(msg)+'</div></div>';
}

function getWeekKey(date = new Date()){
  const d = new Date(date);
  d.setHours(12,0,0,0);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function getWeekLabel(key){
  const d = new Date(key + 'T12:00:00');
  return d.toLocaleDateString('fr-FR',{ day:'numeric', month:'long', year:'numeric' });
}

function daysLeft(){
  const target = new Date('2026-07-27T12:00:00');
  const now = new Date();
  return Math.max(0, Math.ceil((target - now) / 86400000));
}

function dots(val, total=5, cls='on'){
  return '<div class="dots">' + Array.from({length:total}, (_,i)=>'<span class="dot '+(i<val?cls:'')+'"></span>').join('') + '</div>';
}

function pasLabel(v){
  return v === 'low' ? '< 5 000 pas' : v === 'mid' ? '5–10k pas' : '> 10 000 pas';
}

function pasColor(v){
  return v === 'low' ? '#C4622D' : v === 'mid' ? '#D4A72C' : '#2A7F6F';
}

async function loadEntries(){
  if(!firebaseReady){
    entries = safeLocalGet('sante_backup', []);
    dbReady = false;
    return;
  }
  try{
    const ref = collection(db, 'users', USER_ID, 'pesees');
    const q = query(ref, orderBy('key', 'desc'));
    const snap = await getDocs(q);
    entries = snap.docs.map(d => d.data());
    safeLocalSet('sante_backup', entries);
    dbReady = true;
  }catch(e){
    console.error('Firestore load error', e);
    entries = safeLocalGet('sante_backup', []);
    dbReady = false;
  }
}

async function saveLatestEntry(){
  const entry = entries[0];
  if(!entry) return;
  safeLocalSet('sante_backup', entries);
  if(!firebaseReady) return;
  try{
    await setDoc(doc(db, 'users', USER_ID, 'pesees', entry.key), entry);
  }catch(e){
    console.error('Firestore save error', e);
  }
}

function currentWeight(){
  return entries.length ? entries[0].poids.toFixed(1) : '—';
}

function deltaWeight(){
  if(entries.length < 2) return null;
  return +(entries[0].poids - entries[1].poids).toFixed(1);
}

function avgPerWeek(){
  if(entries.length < 2) return 0;
  const oldest = entries[entries.length - 1];
  const newest = entries[0];
  const days = (new Date(newest.key) - new Date(oldest.key)) / 86400000;
  if(days <= 0) return 0;
  return +(((oldest.poids - newest.poids) / days) * 7).toFixed(2);
}

function progressPct(){
  if(!entries.length) return 0;
  const done = DEPART - entries[0].poids;
  const total = DEPART - OBJECTIF;
  return Math.max(0, Math.min(100, Math.round((done / total) * 100)));
}

function ringSvg(){
  const pct = progressPct();
  const r = 52;
  const c = 2 * Math.PI * r;
  const dash = c * pct / 100;
  return `<svg width="130" height="130" viewBox="0 0 130 130" aria-hidden="true">
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#E8E0D0" stroke-width="10"/>
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#2A7F6F" stroke-width="10" stroke-linecap="round" stroke-dasharray="${dash} ${c-dash}" transform="rotate(-90 65 65)"/>
    <text x="65" y="62" text-anchor="middle" font-size="30" font-family="Georgia" font-weight="700" fill="#1A3A4A">${pct}</text>
    <text x="65" y="82" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#6B7A82">%</text>
  </svg>`;
}

function normalizePoids(value){
  const n = parseFloat(String(value).replace(',', '.').trim());
  return Number.isFinite(n) ? n : null;
}

function getJournalDayKey(){
  return new Date().toISOString().slice(0,10);
}

function getJournalItems(){
  const k = getJournalDayKey();
  return journal[k] || [];
}

function saveJournal(){
  const k = getJournalDayKey();
  safeLocalSet('journal_' + k, journal[k] || []);
}

function addFood(idx){
  const item = ALIMENTS[idx];
  const k = getJournalDayKey();
  if(!journal[k]) journal[k] = [];
  journal[k].push({ id: Date.now(), ...item });
  saveJournal();
  render();
}

function removeFood(id){
  const k = getJournalDayKey();
  if(!journal[k]) return;
  journal[k] = journal[k].filter(i => i.id !== id);
  saveJournal();
  render();
}

function journalTotals(){
  return getJournalItems().reduce((acc, item)=>{
    acc.kcal += item.kcal;
    acc.prot += item.prot;
    acc.gluc += item.gluc;
    acc.lip += item.lip;
    return acc;
  }, { kcal:0, prot:0, gluc:0, lip:0 });
}

async function callClaude(prompt){
  const res = await fetch('/api/claude', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:600,
      messages:[
        {
          role:'user',
          content: prompt
        }
      ]
    })
  });

  const data = await res.json();

  if(!res.ok){
    throw new Error(data?.error || 'Erreur IA');
  }

  const txt = data?.content?.find?.(x => x.type === 'text')?.text || data?.content?.[0]?.text || 'Pas de réponse.';
  return txt;
}

  }

  saisieAi = 'Analyse en cours…';
  render();

  const prompt = `
Tu es un coach santé pragmatique.
Analyse cette pesée hebdomadaire en français, ton rassurant, concret, 6 lignes max.
Données :
- poids: ${poids} kg
- moral: ${formState.moral}/5
- tenue du plan: ${formState.plan}/5
- activité: ${pasLabel(formState.pas)}
- note: ${formState.note || 'aucune'}
- objectif: ${OBJECTIF} kg
- départ: ${DEPART} kg

Donne :
1. une lecture rapide,
2. le point positif principal,
3. un seul conseil concret pour les 7 prochains jours.
`.trim();

  try{
    saisieAi = await callClaude(prompt);
  }catch(e){
    saisieAi = 'Erreur IA : ' + e.message;
  }
  render();
}

  const prompt = `
Tu es un coach santé simple et utile.
Fais un mini bilan hebdomadaire en français, 7 lignes max.
Données:
- poids actuel: ${latest.poids} kg
- variation vs précédente: ${diff} kg
- moral: ${latest.moral}/5
- tenue du plan: ${latest.plan}/5
- activité: ${pasLabel(latest.pas)}
- note: ${latest.note || 'aucune'}
- moyenne par semaine: ${avgPerWeek()} kg/semaine
- progression totale: ${progressPct()}%
- objectif final: ${OBJECTIF} kg

Donne:
1. interprétation,
2. vigilance éventuelle,
3. action prioritaire pour la semaine.
`.trim();

  try{
    homeAi = await callClaude(prompt);
  }catch(e){
    homeAi = 'Erreur IA : ' + e.message;
  }
  render();
}

async function analyseJournalIA(){
  const totals = journalTotals();
  const items = getJournalItems();

  if(!items.length){
    alert('Ajoute au moins un aliment dans le journal.');
    return;
  }

  journalAi = 'Analyse en cours…';
  render();

  const liste = items.map(i => `- ${i.nom}: ${i.kcal} kcal, ${i.prot}g prot, ${i.gluc}g gluc, ${i.lip}g lip`).join('\n');

  const prompt = `
Tu es un coach nutrition pragmatique.
Analyse ce journal alimentaire du jour en français, 8 lignes max.
Objectifs:
- calories: ${KCAL_OBJECTIF}
- protéines: ${PROT_OBJECTIF} g

Totaux du jour:
- calories: ${totals.kcal}
- protéines: ${totals.prot} g
- glucides: ${totals.gluc} g
- lipides: ${totals.lip} g

Aliments:
${liste}

Donne:
1. qualité globale de la journée,
2. point fort,
3. point à corriger,
4. un ajustement concret pour ce soir ou demain.
`.trim();

  try{
    journalAi = await callClaude(prompt);
  }catch(e){
    journalAi = 'Erreur IA : ' + e.message;
  }
  render();
}

function submitForm(){
  const poids = normalizePoids(formState.poids);
  if(poids === null || poids < 40 || poids > 250){
    alert('Entre un poids valide, par exemple 92.5');
    return;
  }
  const key = getWeekKey();
  entries = [
    { key, poids, moral: formState.moral, plan: formState.plan, pas: formState.pas, note: formState.note.trim() },
    ...entries.filter(e => e.key !== key)
  ].sort((a,b)=>b.key.localeCompare(a.key));
  saveLatestEntry();
  formState = { poids:'', moral:3, plan:3, pas:'mid', note:'' };
  saisieAi = '';
  goTo('home');
}

function viewHome(){
  const delta = deltaWeight();
  const deltaHtml = delta === null
    ? '<div class="delta neutral">Première mesure</div>'
    : delta < 0
      ? '<div class="delta good">'+Math.abs(delta).toFixed(1)+' kg depuis la dernière pesée</div>'
      : delta > 0
        ? '<div class="delta bad">+'+delta.toFixed(1)+' kg depuis la dernière pesée</div>'
        : '<div class="delta neutral">Stable depuis la dernière pesée</div>';

  return `
    <div class="card">
      <div class="card-title">Poids actuel</div>
      <div class="ring-wrap">
        <div>${ringSvg()}</div>
        <div>
          <div class="big-num">${currentWeight()} <span class="unit">kg</span></div>
          ${deltaHtml}
        </div>
      </div>
    </div>

    <div class="grid2">
      <div class="mini-card"><div class="mini-val">${entries.length}</div><div class="mini-label">Pesées enregistrées</div></div>
      <div class="mini-card"><div class="mini-val">${avgPerWeek()}</div><div class="mini-label">kg / semaine</div></div>
    </div>

    <div class="card">
      <div class="card-title">Statut</div>
      <div class="subtle">${firebaseReady && dbReady ? 'Connexion Firebase active.' : 'Mode local actif ou Firestore indisponible.'}</div>
    </div>

    <div class="status-box">
      Objectif : 84 kg · Échéance : 27 juillet 2026 · ${daysLeft()} jours restants.
    </div>

    <div class="ai-actions">
      <button class="btn-primary teal" onclick="analyseHomeIA()">Bilan IA de la semaine</button>
    </div>

    ${homeAi ? `
      <div class="ai-box">
        <div class="ai-head">Analyse IA</div>
        <div class="ai-body ${homeAi === 'Analyse en cours…' ? 'ai-loading' : ''}">${escapeHtml(homeAi)}</div>
      </div>
    ` : ''}
  `;
}

function viewSaisie(){
  return `
    <div class="card">
      <div class="card-title">Pesée · ${getWeekLabel(getWeekKey())}</div>

      <label class="field-label">Poids ce matin (kg)</label>
      <input type="number" step="0.1" min="40" max="250" placeholder="ex : 92.5" value="${formState.poids}" oninput="formState.poids=this.value">

      <label class="field-label">Moral cette semaine</label>
      <div class="slider-row">
        <input type="range" min="1" max="5" step="1" value="${formState.moral}" oninput="formState.moral=+this.value;render()">
        ${dots(formState.moral,5,'on')}
      </div>

      <label class="field-label">Tenue du plan</label>
      <div class="slider-row">
        <input type="range" min="1" max="5" step="1" value="${formState.plan}" oninput="formState.plan=+this.value;render()">
        ${dots(formState.plan,5,'on-deep')}
      </div>

      <label class="field-label">Activité</label>
      <div class="pas-row">
        <button class="pas-btn ${formState.pas==='low'?'active-low':''}" onclick="setPas('low')">&lt; 5 000</button>
        <button class="pas-btn ${formState.pas==='mid'?'active-mid':''}" onclick="setPas('mid')">5–10k</button>
        <button class="pas-btn ${formState.pas==='high'?'active-high':''}" onclick="setPas('high')">&gt; 10 000</button>
      </div>

      <label class="field-label">Note libre</label>
      <textarea rows="3" placeholder="Bonne semaine, faim ok…" oninput="formState.note=this.value">${escapeHtml(formState.note)}</textarea>

      <button class="btn-primary" onclick="submitForm()">Enregistrer la pesée</button>
      <button class="btn-secondary" onclick="analyseSaisieIA()">Analyser cette saisie avec l’IA</button>
      <button class="btn-secondary" onclick="goTo('home')">Annuler</button>
    </div>

    ${saisieAi ? `
      <div class="ai-box">
        <div class="ai-head">Retour IA sur la saisie</div>
        <div class="ai-body ${saisieAi === 'Analyse en cours…' ? 'ai-loading' : ''}">${escapeHtml(saisieAi)}</div>
      </div>
    ` : ''}
  `;
}

function viewHistorique(){
  if(entries.length === 0){
    return `<div class="empty">Aucune pesée enregistrée.<br>Commence lundi matin à jeun, dans les mêmes conditions chaque semaine.</div>`;
  }
  return `
    <div class="card">
      <div class="card-title">Toutes les pesées (${entries.length})</div>
      ${entries.map((e,i)=>{
        const prev = entries[i+1];
        const diff = prev ? (prev.poids - e.poids) : null;
        let pill = `<span class="pill gray">départ</span>`;
        if(diff !== null){
          const good = diff > 0;
          pill = `<span class="pill ${good?'green':'red'}">${good?'−':'+'}${Math.abs(diff).toFixed(1)} kg</span>`;
        }
        return `
          <div class="hist-row">
            <div class="hist-header">
              <div>
                <div class="hist-date">${getWeekLabel(e.key)}</div>
                <div class="hist-poids">${e.poids.toFixed(1)} kg</div>
              </div>
              ${pill}
            </div>
            <div class="hist-meta">
              ${dots(e.moral,5,'on')}
              ${dots(e.plan,5,'on-deep')}
              <span style="font-size:12px;font-weight:700;color:${pasColor(e.pas)}">${pasLabel(e.pas)}</span>
            </div>
            ${e.note ? `<div class="hist-note">"${escapeHtml(e.note)}"</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function viewRepas(){
  const d = DAYS[currentDay];
  return `
    <div class="card">
      <div class="card-title">Jours types</div>
      <div class="day-tabs">
        ${DAYS.map((day,i)=>`<button class="day-tab ${i===currentDay?'active':''}" onclick="setDay(${i})">${day.nom}</button>`).join('')}
      </div>
    </div>
    ${d.meals.map(m=>`
      <div class="meal-card">
        <div class="meal-time">${m.time} · ${m.kcal} kcal</div>
        <div class="meal-name">${m.name}</div>
        <div class="meal-detail">${m.desc}</div>
      </div>
    `).join('')}
  `;
}

function viewJournal(){
  const totals = journalTotals();
  const k = getJournalDayKey();
  const items = journal[k] || [];
  const queryText = (window._foodSearch || '').toLowerCase().trim();
  const filtered = ALIMENTS.filter(a => !queryText || a.nom.toLowerCase().includes(queryText)).slice(0,12);

  return `
    <div class="bilan-bar">
      <div class="bilan-cell"><div class="bilan-val">${totals.kcal}</div><div class="bilan-label">kcal</div></div>
      <div class="bilan-cell"><div class="bilan-val">${totals.prot}g</div><div class="bilan-label">prot.</div></div>
      <div class="bilan-cell"><div class="bilan-val">${totals.gluc}g</div><div class="bilan-label">gluc.</div></div>
      <div class="bilan-cell"><div class="bilan-val">${totals.lip}g</div><div class="bilan-label">lip.</div></div>
    </div>

    <div class="status-box ${totals.kcal > KCAL_OBJECTIF ? 'warn-box' : ''}">
      Objectif journalier : ${KCAL_OBJECTIF} kcal · ${PROT_OBJECTIF} g protéines.
    </div>

    <div class="search-wrap">
      <input type="text" placeholder="Chercher un aliment..." value="${escapeHtml(window._foodSearch || '')}" oninput="window._foodSearch=this.value;render()">
    </div>

    <div class="aliments-list">
      ${filtered.map((a,i)=>`
        <div class="aliment-row">
          <div>
            <div class="aliment-name">${a.nom}</div>
            <div class="aliment-macros">${a.kcal} kcal · ${a.prot}g prot · ${a.gluc}g gluc · ${a.lip}g lip</div>
          </div>
          <button class="aliment-add" onclick="addFood(${ALIMENTS.findIndex(x => x.nom === a.nom)})">Ajouter</button>
        </div>
      `).join('')}
    </div>

    <div class="journal-list">
      ${items.length ? items.map(item=>`
        <div class="journal-item">
          <div>
            <div class="journal-item-name">${item.nom}</div>
            <div class="journal-item-detail">${item.kcal} kcal · ${item.prot}g prot · ${item.gluc}g gluc · ${item.lip}g lip</div>
          </div>
          <button class="journal-delete" onclick="removeFood(${item.id})">×</button>
        </div>
      `).join('') : `<div class="empty">Aucun aliment ajouté aujourd’hui.</div>`}
    </div>

    <div class="ai-actions">
      <button class="btn-primary terra" onclick="analyseJournalIA()">Analyser mon journal avec l’IA</button>
    </div>

    ${journalAi ? `
      <div class="ai-box">
        <div class="ai-head">Bilan IA du journal</div>
        <div class="ai-body ${journalAi === 'Analyse en cours…' ? 'ai-loading' : ''}">${escapeHtml(journalAi)}</div>
      </div>
    ` : ''}
  `;
}

function render(){
  const titles = {
    home:'Mon suivi santé',
    saisie:'Pesée hebdomadaire',
    historique:'Historique',
    repas:'Plan repas méditerranéen',
    journal:'Journal alimentaire'
  };
  const subs = {
    home:`Objectif 84 kg · 27 juillet 2026 · ${daysLeft()} jours`,
    saisie:'Lundi matin à jeun',
    historique:`${entries.length} semaine${entries.length>1?'s':''} enregistrée${entries.length>1?'s':''}`,
    repas:'Cadre simple et stable',
    journal:'Suivi rapide de la journée'
  };

  pageTitle.textContent = titles[currentView];
  pageSub.textContent = subs[currentView];

  const map = {
    home:viewHome,
    saisie:viewSaisie,
    historique:viewHistorique,
    repas:viewRepas,
    journal:viewJournal
  };
  main.innerHTML = map[currentView]();
}

async function goTo(view){
  currentView = view;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('nav-' + view);
  if(btn) btn.classList.add('active');
  render();
}

function setDay(i){
  currentDay = i;
  render();
}

function setPas(v){
  formState.pas = v;
  render();
}

window.goTo = goTo;
window.setDay = setDay;
window.setPas = setPas;
window.submitForm = submitForm;
window.addFood = addFood;
window.removeFood = removeFood;
window.render = render;
window.analyseSaisieIA = analyseSaisieIA;
window.analyseHomeIA = analyseHomeIA;
window.analyseJournalIA = analyseJournalIA;

Object.defineProperty(window, 'formState', {
  get(){ return formState; },
  set(v){ formState = v; }
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(err => {
    console.warn('SW registration skipped', err);
  });
}

async function boot(){
  showLoader('Connexion à la base…');

  const todayKey = getJournalDayKey();
  journal[todayKey] = safeLocalGet('journal_' + todayKey, []);
  entries = safeLocalGet('sante_backup', []);

  try{
    await signInAnonymously(auth);
    firebaseReady = true;
  }catch(e){
    console.error('Auth error', e);
    firebaseReady = false;
  }

  await loadEntries();
  render();
}

boot();
</script>
</body>
</html>
