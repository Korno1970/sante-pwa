  .card-title { font-size: 11px; font-family: sans-serif; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }

  /* PROGRESS RING */
  .ring-wrap { display: flex; align-items: center; gap: 20px; }
  .big-num { font-size: 36px; font-weight: 700; line-height: 1; }
  .unit { font-size: 14px; color: var(--muted); font-family: sans-serif; font-weight: 400; }
  .delta { font-size: 13px; font-family: sans-serif; margin-top: 6px; font-weight: 600; }
  .delta.good { color: var(--teal); }
  .delta.bad { color: var(--terra); }
  .delta.neutral { color: var(--muted); font-weight: 400; }

  /* GRID STATS */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 16px 0; }
  .mini-card { background: var(--surface); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--border); }
  .mini-val { font-size: 24px; font-weight: 700; }
  .mini-label { font-size: 11px; font-family: sans-serif; color: var(--muted); margin-top: 3px; }

  /* FORM */
  label.field-label { display: block; font-size: 11px; font-family: sans-serif; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  input[type=number], textarea { width: 100%; padding: 11px 14px; font-size: 16px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--deep); font-family: sans-serif; outline: none; margin-bottom: 16px; }
  input[type=range] { width: 100%; accent-color: var(--teal); }

  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--sand); display: inline-block; }
  .dot.on { background: var(--teal); }
  .dot.on-deep { background: var(--deep); }

  .pas-btn { flex: 1; padding: 10px 4px; font-size: 12px; font-family: sans-serif; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-weight: 400; transition: all 0.15s; }
  .pas-btn.active-low { border-color: #C4622D; background: #C4622D18; color: #C4622D; font-weight: 700; }

  .pas-btn.active-high { border-color: #2A7F6F; background: #2A7F6F18; color: #2A7F6F; font-weight: 700; }

const app = document.getElementById('app');
const pageTitle = document.getElementById('page-title');
const pageSub = document.getElementById('page-sub');
const main = document.getElementById('main');

function safeLocalGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (_) {
    return fallback;
  }
}

function safeLocalSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {}
}

function showLoader(msg) {
  main.innerHTML = `<div class="empty" style="padding-top:60px"><div style="font-size:32px;margin-bottom:12px">⏳</div><div style="font-family:sans-serif;color:var(--muted)">${msg}</div></div>`;
}

function getWeekKey(date = new Date()) {
  const d = new Date(date);
  d.setHours(12, 0, 0, 0);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}

function getWeekLabel(key) {
  const d = new Date(`${key}T12:00:00`);
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
}

function daysLeft() {
  const target = new Date('2026-07-27T12:00:00');
  const now = new Date();
  return Math.max(0, Math.ceil((target - now) / 86400000));
}

function dots(val, total = 5, cls = 'on') {
  return `<div class="dots">${Array.from({ length: total }, (_, i) => `<span class="dot ${i < val ? cls : ''}"></span>`).join('')}</div>`;
}

function pasLabel(v) {
  return v === 'low' ? '< 5 000 pas' : v === 'mid' ? '5–10k pas' : '> 10 000 pas';
}

function pasColor(v) {
  return v === 'low' ? '#C4622D' : v === 'mid' ? '#D4A72C' : '#2A7F6F';
}

async function loadEntries() {
  if (!firebaseReady) {
    entries = safeLocalGet('sante_backup', []);
    dbReady = false;
    return;
  }
  try {
    const ref = collection(db, 'users', USER_ID, 'pesees');
    const q = query(ref, orderBy('key', 'desc'));
    const snap = await getDocs(q);
    entries = snap.docs.map(d => d.data());
    safeLocalSet('sante_backup', entries);
    dbReady = true;
  } catch (e) {
    console.error('Firestore load error', e);
    entries = safeLocalGet('sante_backup', []);
    dbReady = false;
  }
}

async function saveEntries() {
  const entry = entries[0];
  if (!entry) return;
  safeLocalSet('sante_backup', entries);
  if (!firebaseReady) return;
  try {
    await setDoc(doc(db, 'users', USER_ID, 'pesees', entry.key), entry);
  } catch (e) {
    console.error('Firestore save error', e);
  }
}

async function loadJournal(dateKey) {
  if (!firebaseReady) {
    journal[dateKey] = safeLocalGet('journal_' + dateKey, []);
    return;
  }
  try {
    const ref = doc(db, 'users', USER_ID, 'journal', dateKey);
    const snap = await getDoc(ref);
    journal[dateKey] = snap.exists() ? (snap.data().items || []) : [];
    safeLocalSet('journal_' + dateKey, journal[dateKey]);
  } catch (e) {
    console.error('Journal load error', e);
    journal[dateKey] = safeLocalGet('journal_' + dateKey, []);
  }
}

async function saveJournalDay(dateKey) {
  const items = journal[dateKey] || [];
  safeLocalSet('journal_' + dateKey, items);
  if (!firebaseReady) return;
  try {
    const pas = journalDate === dateKey ? journalPas : (journal[dateKey+'_pas'] || 0);
    await setDoc(doc(db, 'users', USER_ID, 'journal', dateKey), { items, pas, updatedAt: Date.now() });
  } catch (e) {
    console.error('Journal save error', e);
  }
}

async function goTo(view) {
  currentView = view;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + view);
  if (btn) btn.classList.add('active');
  if (view === 'journal' && !journal[journalDate]) {
    showLoader('Chargement du journal…');
    await loadJournal(journalDate);
  }
  render();
}

function currentWeight() {
  return entries.length ? entries[0].poids.toFixed(1) : '—';
}

function deltaWeight() {
  if (entries.length < 2) return null;
  return +(entries[0].poids - entries[1].poids).toFixed(1);
}

function avgPerWeek() {
  if (entries.length < 2) return 0;
  const oldest = entries[entries.length - 1];
  const newest = entries[0];
  const days = (new Date(newest.key) - new Date(oldest.key)) / 86400000;
  if (days <= 0) return 0;
  return +(((oldest.poids - newest.poids) / days) * 7).toFixed(2);
}

function progressPct() {
  if (!entries.length) return 0;
  const done = DEPART - entries[0].poids;
  const total = DEPART - OBJECTIF;
  return Math.max(0, Math.min(100, Math.round((done / total) * 100)));
}

function ringSvg() {
  const pct = progressPct();
  const r = 52;
  const c = 2 * Math.PI * r;
  const dash = c * pct / 100;
  return `<svg width="130" height="130" viewBox="0 0 130 130" aria-hidden="true">
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#E8E0D0" stroke-width="10"/>
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#2A7F6F" stroke-width="10" stroke-linecap="round" stroke-dasharray="${dash} ${c-dash}" transform="rotate(-90 65 65)"/>
    <text x="65" y="62" text-anchor="middle" font-size="30" font-family="Georgia" font-weight="700" fill="#1A3A4A">${pct}</text>
    <text x="65" y="82" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#6B7A82">%</text>
  </svg>`;
}

function renderDots(id, val, cls) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = dots(val, 5, cls);
}

function setPas(val) {
  formState.pas = val;
  render();
}

function setDay(i) {
  currentDay = i;
  render();
}

function normalizePoids(value) {
  const n = parseFloat(String(value).replace(',', '.').trim());
  return Number.isFinite(n) ? n : null;
}

function submitForm() {
  const poids = normalizePoids(formState.poids);
  if (poids === null || poids < 40 || poids > 250) {
    alert('Entre un poids valide (ex : 92.5)');
    return;
  }
  const key = getWeekKey();
  entries = [
    { key, poids, moral: formState.moral, plan: formState.plan, pas: formState.pas, note: formState.note.trim() },
    ...entries.filter(e => e.key !== key)
  ].sort((a, b) => b.key.localeCompare(a.key));
  saveEntries();
  formState = { poids: '', moral: 3, plan: 3, pas: 'mid', note: '' };
  savedAnim = true;
  render();
  setTimeout(() => {
    savedAnim = false;
    goTo('home');
  }, 1200);
}

function viewHome() {
  const delta = deltaWeight();
  const deltaHtml = delta === null
    ? `<div class="delta neutral">Première mesure</div>`
    : delta < 0
      ? `<div class="delta good">${Math.abs(delta).toFixed(1)} kg depuis la dernière pesée</div>`
      : delta > 0
        ? `<div class="delta bad">+${delta.toFixed(1)} kg depuis la dernière pesée</div>`
        : `<div class="delta neutral">Stable depuis la dernière pesée</div>`;

  return `<div class="card">
    <div class="card-title">Poids actuel</div>
    <div class="ring-wrap">
      <div>${ringSvg()}</div>
      <div>
        <div class="big-num">${currentWeight()} <span class="unit">kg</span></div>
        ${deltaHtml}
      </div>
    </div>
  </div>
  <div class="grid2">
    <div class="mini-card"><div class="mini-val">${entries.length}</div><div class="mini-label">Pesées enregistrées</div></div>
    <div class="mini-card"><div class="mini-val">${avgPerWeek()}</div><div class="mini-label">kg / semaine</div></div>
  </div>
  <div class="card">
    <div class="card-title">Statut</div>
    <div style="font-size:13px;font-family:sans-serif;color:var(--muted);line-height:1.5">
      ${firebaseReady ? 'Synchronisé avec Firebase.' : 'Mode local actif.'}
    </div>
    ${window._showInstall ? `<button class="btn-secondary" style="margin-top:12px" onclick="installPWA()">Installer l’app</button>` : ''}
  </div>`;
}

function viewHistorique() {
  if (entries.length === 0) return `<div class="empty">Aucune pesée enregistrée.<br>Commence lundi matin à jeun,<br>dans les mêmes conditions chaque semaine.</div>`;
  return `<div class="card">
    <div class="card-title">Toutes les pesées (${entries.length})</div>
    ${entries.map((e, i) => {
      const prev = entries[i + 1];
      const diff = prev ? (prev.poids - e.poids) : null;
      let pillHtml = `<span class="pill gray">départ</span>`;
      if (diff !== null) {
        const good = diff > 0;
        pillHtml = `<span class="pill ${good ? 'green' : 'red'}">${good ? '−' : '+'}${Math.abs(diff).toFixed(1)} kg</span>`;
      }
      return `<div class="hist-row">
        <div class="hist-header">
          <div>
            <div class="hist-date">${getWeekLabel(e.key)}</div>
            <div class="hist-poids">${e.poids.toFixed(1)} kg</div>
          </div>
          ${pillHtml}
        </div>
        <div class="hist-meta">
          <div class="dots">${dots(e.moral, 5, 'on')}</div>
          <div class="dots">${dots(e.plan, 5, 'on-deep')}</div>
          <span style="font-size:12px;font-weight:700;color:${pasColor(e.pas)}">${pasLabel(e.pas)}</span>
        </div>
        ${e.note ? `<div class="hist-note">"${e.note}"</div>` : ''}
      </div>`;
    }).join('')}
  </div>`;
}

function viewRepas() {
  const d = DAYS[currentDay];
  const badgeHtml = b => `<span class="badge ${BADGE_DEF[b][0]}">${BADGE_DEF[b][1]}</span>`;
  return `<div class="card">
    <div class="card-title">Jours types</div>
    <div class="day-tabs">
      ${DAYS.map((day, i) => `<button class="day-tab ${i===currentDay?'active':''}" onclick="setDay(${i})">${day.nom}</button>`).join('')}
    </div>
    <div class="meal-grid">
      ${d.meals.map(m => `<div class="meal-card">
        <div class="meal-header">
          <div class="meal-time">${m.time}</div>
          <div class="meal-kcal">${m.kcal} kcal</div>
        </div>
        <div class="meal-name">${m.name}</div>
        <div class="meal-desc">${m.desc}</div>
        <div class="badge-row">${m.badges.map(badgeHtml).join('')}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function getJournalItems(dateKey) {
  return journal[dateKey] || [];
}

function getJournalBilan(dateKey) {
  const items = getJournalItems(dateKey);
  return items.reduce((acc, item) => {
    const factor = item.qty / 100;
    acc.kcal += Math.round(item.kcal * factor);
    acc.prot += Math.round(item.prot * factor);
    acc.gluc += Math.round(item.gluc * factor);
    acc.lip += Math.round(item.lip * factor);
    return acc;
  }, { kcal: 0, prot: 0, gluc: 0, lip: 0 });
}

function dateLabel(dateKey) {
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yKey = yesterday.toISOString().slice(0, 10);
  if (dateKey === today) return "Aujourd'hui";
  if (dateKey === yKey) return 'Hier';
  const d = new Date(dateKey);
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

async function shiftJournalDate(delta) {
  const d = new Date(journalDate);
  d.setDate(d.getDate() + delta);
  const today = new Date();
  if (d > today) return;
  journalDate = d.toISOString().slice(0, 10);
  if (!journal[journalDate]) {
    showLoader('Chargement du journal…');
    await loadJournal(journalDate);
  }
  render();
}

async function addAlimentToJournal() {
  const qty = parseFloat(pendingQty);
  if (!pendingAliment || isNaN(qty) || qty <= 0) return;
  if (!journal[journalDate]) journal[journalDate] = [];
  journal[journalDate].push({
    id: Date.now(),
    nom: pendingAliment.nom,
    kcal: pendingAliment.kcal,
    prot: pendingAliment.prot,
    gluc: pendingAliment.gluc,
    lip: pendingAliment.lip,
    qty,
    moment: journalMoment
  });
  await saveJournalDay(journalDate);
  pendingAliment = null;
  pendingQty = '100';
  journalSearch = '';
  render();
}

async function removeJournalItem(dateKey, id) {
  if (!journal[dateKey]) return;
  journal[dateKey] = journal[dateKey].filter(i => i.id !== id);
  await saveJournalDay(dateKey);
  render();
}

function openQtyModal(index) {
  const filtered = ALIMENTS.filter(a =>
    journalSearch.trim().length < 1 ? false : a.nom.toLowerCase().includes(journalSearch.toLowerCase()) || a.cat.toLowerCase().includes(journalSearch.toLowerCase())
  );
  pendingAliment = filtered[index] || null;
  pendingQty = '100';
  render();
}

function viewJournal() {
  const bilan = getJournalBilan(journalDate);
  const kcalPct = Math.min(100, Math.round((bilan.kcal / KCAL_OBJECTIF) * 100));
  const protPct = Math.min(100, Math.round((bilan.prot / PROT_OBJECTIF) * 100));
  const kcalClass = bilan.kcal > KCAL_OBJECTIF * 1.1 ? 'over' : bilan.kcal > KCAL_OBJECTIF * 0.8 ? 'ok' : 'warn';
  const protClass = bilan.prot >= PROT_OBJECTIF ? 'ok' : bilan.prot >= PROT_OBJECTIF * 0.7 ? 'warn' : 'over';

  const filtered = journalSearch.trim().length >= 1
    ? ALIMENTS.filter(a => a.nom.toLowerCase().includes(journalSearch.toLowerCase()) || a.cat.toLowerCase().includes(journalSearch.toLowerCase())).slice(0, 15)
    : [];

  const items = getJournalItems(journalDate);
  const moments = ['Matin', 'Déjeuner', 'Collation', 'Dîner'];
  const momentIcons = { Matin:'🌅', Déjeuner:'☀️', Collation:'🍎', Dîner:'🌙' };

  let journalHtml = '';
  moments.forEach(m => {
    const mItems = items.filter(i => i.moment === m);
    if (mItems.length === 0) return;
    const mKcal = mItems.reduce((s, i) => s + Math.round(i.kcal * i.qty / 100), 0);
    journalHtml += `<div class="meal-section">
      <div class="meal-section-title">${momentIcons[m]} ${m} · ${mKcal} kcal</div>
      ${mItems.map(i => {
        const k = Math.round(i.kcal * i.qty / 100);
        const p = Math.round(i.prot * i.qty / 100);
        return `<div class="journal-item">
          <div>
            <div class="journal-item-name">${i.nom.replace(/\(100g\)/,'').replace(/\(.*?\)/,'').trim()} ${i.qty !== 100 ? `· ${i.qty}g` : ''}</div>
            <div class="journal-item-detail">${k} kcal · ${p}g prot</div>
          </div>
          <button class="journal-delete" onclick="removeJournalItem('${journalDate}', ${i.id})">×</button>
        </div>`;
      }).join('')}
    </div>`;
  });

  const modalHtml = pendingAliment ? `
    <div class="overlay" onclick="pendingAliment=null;render()"></div>
    <div class="qty-modal">
      <h3>${pendingAliment.nom.replace(/\(100g\)/,'').trim()}</h3>
      <p>${pendingAliment.cat} · base 100g : ${pendingAliment.kcal} kcal · ${pendingAliment.prot}g prot</p>
      <div style="margin-bottom:10px">
        <label class="field-label">Moment du repas</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${moments.map(m => `<button id="mbtn-${m}" style="padding:6px 12px;border-radius:20px;font-size:12px;font-family:sans-serif;border:1.5px solid ${journalMoment===m?'var(--teal)':'var(--border)'};background:${journalMoment===m?'var(--teal-light)':'transparent'};color:${journalMoment===m?'var(--teal)':'var(--muted)'};cursor:pointer;font-weight:${journalMoment===m?700:400}" onclick="setMoment('${m}')">${momentIcons[m]} ${m}</button>`).join('')}
        </div>
      </div>
      <div class="qty-row">
        <input class="qty-input" type="number" id="qty-inp" value="${pendingQty}" min="1" max="2000" oninput="pendingQty=this.value;renderQtyPreview()" inputmode="decimal">
        <span class="qty-unit">grammes</span>
      </div>
      <div class="qty-preview" id="qty-preview">
        ${(() => { const f = parseFloat(pendingQty)/100; return `<span>⚡ ${Math.round(pendingAliment.kcal*f)} kcal</span><span>💪 ${Math.round(pendingAliment.prot*f)}g prot</span><span>🌾 ${Math.round(pendingAliment.gluc*f)}g gluc</span>`; })()}
      </div>
      <button class="btn-primary" onclick="addAlimentToJournal()">Ajouter au journal</button>
    </div>` : '';

  return `
    <div class="date-nav">
      <button class="date-nav-btn" onclick="shiftJournalDate(-1)">‹</button>
      <span class="date-nav-label">${dateLabel(journalDate)}</span>
      <button class="date-nav-btn" onclick="shiftJournalDate(1)" ${journalDate === new Date().toISOString().slice(0, 10) ? 'disabled style="opacity:0.3"' : ''}>›</button>
    </div>

    <div class="bilan-bar">
      <div class="bilan-cell"><div class="bilan-val ${kcalClass}">${bilan.kcal}</div><div class="bilan-label">kcal ingérées</div></div>
      <div class="bilan-cell"><div class="bilan-val ${protClass}">${bilan.prot}g</div><div class="bilan-label">protéines</div></div>
      <div class="bilan-cell"><div class="bilan-val">${bilan.gluc}g</div><div class="bilan-label">glucides</div></div>
      <div class="bilan-cell"><div class="bilan-val">${bilan.lip}g</div><div class="bilan-label">lipides</div></div>
    </div>
    <div class="bilan-bar" style="margin-top:8px">
      <div class="bilan-cell" style="grid-column:span 2">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">👟</span>
          <input type="number" id="pas-input" value="${journalPas}" min="0" max="50000" step="100"
            style="width:90px;padding:4px 8px;font-size:16px;font-weight:700;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--deep);font-family:sans-serif"
            oninput="updatePas(this.value)">
          <span style="font-size:12px;color:var(--muted);font-family:sans-serif">pas aujourd'hui</span>
        </div>
        <div style="font-size:11px;color:var(--muted);font-family:sans-serif;margin-top:4px" id="pas-bilan">
          +${Math.round(journalPas * 0.04)} kcal brûlées · Budget total : ${KCAL_OBJECTIF + Math.round(journalPas * 0.04)} kcal
        </div>
      </div>
      <div class="bilan-cell" style="grid-column:span 2">
        <div class="bilan-val ${(KCAL_OBJECTIF + Math.round(journalPas*0.04) - bilan.kcal) >= 0 ? 'ok' : 'over'}" id="pas-restant">${Math.abs(KCAL_OBJECTIF + Math.round(journalPas*0.04) - bilan.kcal)}</div>
        <div class="bilan-label" id="pas-restant-label">${(KCAL_OBJECTIF + Math.round(journalPas*0.04) - bilan.kcal) >= 0 ? 'kcal restantes' : 'kcal dépassées'}</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label"><span>Calories</span><span>${bilan.kcal} / ${KCAL_OBJECTIF} kcal</span></div>
      <div class="progress-track"><div class="progress-fill-bar" style="width:${kcalPct}%;background:${bilan.kcal > KCAL_OBJECTIF * 1.1 ? 'var(--terra)' : 'var(--teal)'}"></div></div>
    </div>
    <div class="progress-wrap" style="margin-top:6px">
      <div class="progress-label"><span>Protéines</span><span>${bilan.prot} / ${PROT_OBJECTIF}g</span></div>
      <div class="progress-track"><div class="progress-fill-bar" style="width:${protPct}%;background:var(--deep)"></div></div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Ajouter un aliment… (ex: saumon, œuf, skyr)" value="${journalSearch}"
        oninput="journalSearch=this.value;document.getElementById('aliments-res').innerHTML=renderAlimentsList()" id="journal-search">
    </div>

    <div id="aliments-res">
      ${filtered.length > 0 ? `<div class="aliments-list">${filtered.map((a, i) => `
        <div class="aliment-row">
          <div>
            <div class="aliment-name">${a.nom}</div>
            <div class="aliment-macros">${a.kcal} kcal · ${a.prot}g prot · ${a.gluc}g gluc · ${a.lip}g lip</div>
          </div>
          <button class="aliment-add" onclick="openQtyModal(${i})">+</button>
        </div>`).join('')}</div>` : journalSearch.trim().length >= 1 ? `<div style="margin:8px 16px;font-size:13px;font-family:sans-serif;color:var(--muted)">Aucun résultat pour "${journalSearch}"</div>` : ''}
    </div>

    ${items.length > 0 ? journalHtml : `<div class="empty" style="padding-top:16px">Aucun aliment enregistré.<br>Tape le nom d'un aliment ci-dessus.${journalDate !== new Date().toISOString().slice(0, 10) ? '<br><span style="font-size:12px">Jour passé — édition possible.</span>' : ''}</div>`}

    <div style="height:16px"></div>
    ${modalHtml}
  `;
}

function renderAlimentsList() {
  const filtered = journalSearch.trim().length >= 1
    ? ALIMENTS.filter(a => a.nom.toLowerCase().includes(journalSearch.toLowerCase()) || a.cat.toLowerCase().includes(journalSearch.toLowerCase())).slice(0, 15)
    : [];
  if (filtered.length === 0) return journalSearch.trim().length >= 1 ? `<div style="margin:8px 16px;font-size:13px;font-family:sans-serif;color:var(--muted)">Aucun résultat.</div>` : '';
  return `<div class="aliments-list">${filtered.map((a, i) => `
    <div class="aliment-row">
      <div>
        <div class="aliment-name">${a.nom}</div>
        <div class="aliment-macros">${a.kcal} kcal · ${a.prot}g prot · ${a.gluc}g gluc · ${a.lip}g lip</div>
      </div>
      <button class="aliment-add" onclick="openQtyModal(${i})">+</button>
    </div>`).join('')}</div>`;
}

function setMoment(m) {
  journalMoment = m;
  render();
}

function renderQtyPreview() {
  const qty = parseFloat(document.getElementById('qty-inp')?.value || pendingQty) / 100;
  const el = document.getElementById('qty-preview');
  if (el && pendingAliment) {
    el.innerHTML = `<span>⚡ ${Math.round(pendingAliment.kcal*qty)} kcal</span><span>💪 ${Math.round(pendingAliment.prot*qty)}g prot</span><span>🌾 ${Math.round(pendingAliment.gluc*qty)}g gluc</span>`;
  }
}

function render() {
  const titles = { home: 'Mon suivi santé', saisie: 'Pesée hebdomadaire', historique: 'Historique', repas: 'Plan repas méditerranéen', journal: 'Journal alimentaire' };
  const subs = { home: `Objectif 84 kg · 27 juillet 2026 · ${daysLeft()} jours`, saisie: 'Lundi matin à jeun', historique: `${entries.length} semaine${entries.length > 1 ? 's' : ''} enregistrée${entries.length > 1 ? 's' : ''}`, repas: '~1 400–1 600 kcal/j · festin vendredi', journal: `Objectif : ${KCAL_OBJECTIF} kcal · ${PROT_OBJECTIF}g protéines` };
  pageTitle.textContent = titles[currentView];
  pageSub.textContent = subs[currentView];
  const views = { home: viewHome, saisie: viewSaisie, historique: viewHistorique, repas: viewRepas, journal: viewJournal };
  main.innerHTML = views[currentView]();
  main.scrollTop = 0;
  if (currentView === 'journal') {
    const inp = document.getElementById('journal-search');
    if (inp) inp.focus();
  }
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  window._showInstall = true;
  if (currentView === 'home') render();
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    window._showInstall = false;
  });
}

function updatePas(val) {
  journalPas = parseInt(val) || 0;
  journal[journalDate+'_pas'] = journalPas;
  saveJournalDay(journalDate);
  // Mise à jour ciblée sans re-render (évite la fermeture du clavier mobile)
  const bilan = getJournalBilan(journalDate);
  const kcalBrulees = Math.round(journalPas * 0.04);
  const budget = KCAL_OBJECTIF + kcalBrulees;
  const restant = budget - bilan.kcal;
  const el = document.getElementById('pas-bilan');
  if (el) {
    el.innerHTML = '+' + kcalBrulees + ' kcal brûlées · Budget total : ' + budget + ' kcal';
  }
  const elRestant = document.getElementById('pas-restant');
  if (elRestant) {
    elRestant.textContent = Math.abs(restant);
    elRestant.className = 'bilan-val ' + (restant >= 0 ? 'ok' : 'over');
  }
  const elLabel = document.getElementById('pas-restant-label');
  if (elLabel) {
    elLabel.textContent = restant >= 0 ? 'kcal restantes' : 'kcal dépassées';
  }
}

window.goTo = goTo;
window.setDay = setDay;
window.setPas = setPas;
window.submitForm = submitForm;
window.renderDots = renderDots;
window.shiftJournalDate = shiftJournalDate;
window.updatePas = updatePas;
  window.updatePas = updatePas;
window.openQtyModal = openQtyModal;
window.addAlimentToJournal = addAlimentToJournal;
window.removeJournalItem = removeJournalItem;
window.setMoment = setMoment;
window.renderQtyPreview = renderQtyPreview;
window.renderAlimentsList = renderAlimentsList;
window.installPWA = installPWA;
window.render = render;
Object.defineProperty(window, 'formState', { get: () => formState, set: v => { formState = v; } });
Object.defineProperty(window, 'journalSearch', { get: () => journalSearch, set: v => { journalSearch = v; } });
Object.defineProperty(window, 'pendingQty', { get: () => pendingQty, set: v => { pendingQty = v; } });
Object.defineProperty(window, 'pendingAliment', { get: () => pendingAliment, set: v => { pendingAliment = v; } });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration skipped:', err));
}

showLoader('Connexion à la base de données…');
signInAnonymously(auth)
  .then(async () => {
    firebaseReady = true;
    await loadEntries();
    if (!journal[journalDate]) await loadJournal(journalDate);
    render();
  })
  .catch(async e => {
    console.error('Auth error', e);
    firebaseReady = false;
    await loadEntries();
    if (!journal[journalDate]) await loadJournal(journalDate);
    render();
  });
</script>
</body>
</html>
