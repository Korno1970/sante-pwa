<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1A3A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Santé">
<link rel="manifest" href="./manifest.json">
<title>Suivi Santé</title>
<style>
  :root {
    --bg: #F7F4EE;
    --surface: #FFFFFF;
    --deep: #1A3A4A;
    --teal: #2A7F6F;
    --teal-light: #E8F5F2;
    --terra: #C4622D;
    --terra-light: #FAF0EA;
    --sand: #E8E0D0;
    --muted: #6B7A82;
    --border: rgba(26,58,74,0.12);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: 'Georgia', Georgia, serif; color: var(--deep); }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  .header { background: var(--deep); color: #fff; padding: 20px 20px 16px; padding-top: calc(20px + env(safe-area-inset-top, 0px)); }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header p { font-size: 12px; opacity: 0.6; margin-top: 3px; font-family: sans-serif; }

  /* SCROLL ZONE */
  .scroll-zone { flex: 1; overflow-y: auto; padding-bottom: calc(72px + var(--safe-bottom)); }

  /* NAV */
  nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: calc(10px + var(--safe-bottom)); z-index: 100; }
  nav button { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; font-family: sans-serif; color: var(--muted); padding: 4px 16px; }
  nav button.active { color: var(--teal); font-weight: 700; }
  nav button span.ico { font-size: 22px; line-height: 1; }

  /* CARDS */
  .card { background: var(--surface); border-radius: 16px; margin: 16px 16px 0; padding: 18px 20px; border: 1px solid var(--border); }
  .card-title { font-size: 11px; font-family: sans-serif; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }

  /* PROGRESS RING */
  .ring-wrap { display: flex; align-items: center; gap: 20px; }
  .big-num { font-size: 36px; font-weight: 700; line-height: 1; }
  .unit { font-size: 14px; color: var(--muted); font-family: sans-serif; font-weight: 400; }
  .delta { font-size: 13px; font-family: sans-serif; margin-top: 6px; font-weight: 600; }
  .delta.good { color: var(--teal); }
  .delta.bad { color: var(--terra); }
  .delta.neutral { color: var(--muted); font-weight: 400; }

  /* GRID STATS */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 16px 0; }
  .mini-card { background: var(--surface); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--border); }
  .mini-val { font-size: 24px; font-weight: 700; }
  .mini-label { font-size: 11px; font-family: sans-serif; color: var(--muted); margin-top: 3px; }

  /* FORM */
  label.field-label { display: block; font-size: 11px; font-family: sans-serif; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  input[type=number], textarea { width: 100%; padding: 11px 14px; font-size: 16px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--deep); font-family: sans-serif; outline: none; margin-bottom: 16px; }
  input[type=range] { width: 100%; accent-color: var(--teal); }
  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .dots { display: inline-flex; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--sand); display: inline-block; }
  .dot.on { background: var(--teal); }
  .dot.on-deep { background: var(--deep); }

  /* PAS BUTTONS */
  .pas-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .pas-btn { flex: 1; padding: 10px 4px; font-size: 12px; font-family: sans-serif; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-weight: 400; transition: all 0.15s; }
  .pas-btn.active-low { border-color: #C4622D; background: #C4622D18; color: #C4622D; font-weight: 700; }
  .pas-btn.active-mid { border-color: #D4A72C; background: #D4A72C18; color: #D4A72C; font-weight: 700; }
  .pas-btn.active-high { border-color: #2A7F6F; background: #2A7F6F18; color: #2A7F6F; font-weight: 700; }

  /* BUTTONS */
  .btn-primary, .btn-secondary { width: 100%; border: none; border-radius: 12px; padding: 14px 16px; font-size: 15px; font-family: sans-serif; font-weight: 700; cursor: pointer; }
  .btn-primary { background: var(--deep); color: white; }
  .btn-secondary { background: var(--teal-light); color: var(--teal); margin-top: 10px; }

  /* HISTORIQUE */
  .entry-list { margin-top: 10px; }
  .entry {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .entry:last-child { border-bottom: none; }
  .entry-date { font-size: 13px; font-family: sans-serif; color: var(--muted); }
  .entry-weight { font-size: 20px; font-weight: 700; }
  .entry-meta { font-size: 12px; font-family: sans-serif; color: var(--muted); margin-top: 2px; }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .tag { font-size: 11px; font-family: sans-serif; padding: 4px 8px; border-radius: 999px; background: var(--bg); color: var(--muted); }

  /* REPAS */
  .meal-grid { display: grid; gap: 10px; margin-top: 8px; }
  .meal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .meal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .meal-name { font-size: 16px; font-weight: 700; }
  .meal-kcal { font-size: 14px; font-family: sans-serif; color: var(--terra); font-weight: 700; }
  .meal-desc { font-size: 13px; font-family: sans-serif; color: var(--muted); line-height: 1.4; }
  .macro-row { display: flex; gap: 12px; margin-top: 10px; font-size: 12px; font-family: sans-serif; color: var(--muted); }

  /* JOURNAL */
  .date-nav {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin: 16px 16px 0;
  }
  .date-nav-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); color: var(--deep); font-size: 18px; cursor: pointer;
  }
  .date-nav-label {
    font-size: 14px; font-family: sans-serif; font-weight: 700; min-width: 180px; text-align: center;
  }
  .bilan-bar {
    margin: 12px 16px 0; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .bilan-cell { text-align: center; }
  .bilan-val { font-size: 20px; font-weight: 700; line-height: 1; }
  .bilan-val.ok { color: var(--teal); }
  .bilan-val.warn { color: #D4A72C; }
  .bilan-val.over { color: var(--terra); }
  .bilan-label { font-size: 10px; font-family: sans-serif; color: var(--muted); text-transform: uppercase; margin-top: 4px; letter-spacing: 0.06em; }

  .progress-wrap { margin: 12px 16px 0; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; font-family: sans-serif; color: var(--muted); margin-bottom: 6px; }
  .progress-track { width: 100%; height: 10px; background: var(--sand); border-radius: 999px; overflow: hidden; }
  .progress-fill-bar { height: 100%; border-radius: 999px; }

  .search-wrap {
    margin: 16px 16px 0; position: relative;
  }
  .search-input {
    width: 100%; padding: 12px 14px 12px 40px; border: 1.5px solid var(--border);
    border-radius: 12px; background: var(--surface); font-size: 15px; font-family: sans-serif; outline: none;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; opacity: 0.45;
  }

  .aliments-list { margin: 10px 16px 0; display: grid; gap: 8px; }
  .aliment-row {
    display: flex; justify-content: space-between; gap: 12px; align-items: center;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px;
  }
  .aliment-name { font-size: 14px; font-family: sans-serif; font-weight: 700; }
  .aliment-macros { font-size: 11px; font-family: sans-serif; color: var(--muted); margin-top: 3px; }
  .aliment-add {
    width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--deep);
    color: white; font-size: 22px; line-height: 1; cursor: pointer;
  }

  .meal-section { margin: 14px 16px 0; }
  .meal-section-title { font-size: 12px; font-family: sans-serif; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .journal-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .journal-item-name { font-size: 14px; font-family: sans-serif; font-weight: 700; }
  .journal-item-detail { font-size: 11px; font-family: sans-serif; color: var(--muted); margin-top: 2px; }
  .journal-delete {
    width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--terra-light); color: var(--terra);
    font-size: 20px; line-height: 1; cursor: pointer;
  }

  .overlay {
    position: fixed; inset: 0; background: rgba(26,58,74,0.28); z-index: 190;
  }
  .qty-modal {
    position: fixed; left: 16px; right: 16px; bottom: calc(16px + var(--safe-bottom));
    background: var(--surface); border-radius: 20px; padding: 18px 18px 16px; z-index: 200;
    border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(26,58,74,0.14);
  }
  .qty-modal h3 { font-size: 20px; margin-bottom: 6px; }
  .qty-modal p { font-size: 12px; font-family: sans-serif; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
  .qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .qty-input {
    flex: 1; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 18px; font-family: sans-serif; outline: none; background: var(--bg);
  }
  .qty-unit { font-size: 13px; font-family: sans-serif; color: var(--muted); }
  .qty-preview {
    display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; font-family: sans-serif;
    color: var(--muted); margin-bottom: 14px;
  }

  /* LOADER */
  .loader { padding: 28px 20px; font-family: sans-serif; color: var(--muted); text-align: center; }

  /* EMPTY */
  .empty { padding: 24px 20px; text-align: center; font-family: sans-serif; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
// ─── FIREBASE ────────────────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyXXXXXXX",
  authDomain: "pwa---sante.firebaseapp.com",
  projectId: "pwa---sante",
  storageBucket: "pwa---sante.firebasestorage.app",
  messagingSenderId: "1234567890",
  appId: "1:1234567890:web:abcdef123456"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
let firebaseReady = false;

const USER_ID = 'sylvain';

// ─── STATE ───────────────────────────────────────────────
let currentView = 'home';
let entries = [];
let form = { weight: '', faim: 2, fatigue: 2, pas: 'mid', note: '' };
let journal = {};
let journalDate = todayKey();
let journalSearch = '';
let pendingAliment = null;
let pendingQty = '100';
let journalMoment = 'Déjeuner';

const OBJECTIF = 84;

// ─── APP ─────────────────────────────────────────────────
const app = document.getElementById('app');

function showLoader(txt='Chargement…') {
  app.innerHTML = `<div class="loader">${txt}</div>`;
}

function todayKey() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function formatDateFR(key) {
  const d = new Date(`${key}T12:00:00`);
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
}

function weekdayFR(key) {
  const d = new Date(`${key}T12:00:00`);
  return d.toLocaleDateString('fr-FR', { weekday: 'long' });
}

function weightDelta() {
  if (entries.length < 2) return null;
  return +(entries[0].weight - entries[1].weight).toFixed(1);
}

function currentWeight() {
  return entries.length ? entries[0].weight : '—';
}

function progressPct() {
  if (!entries.length) return 0;
  const start = 98;
  const current = entries[0].weight;
  const total = start - OBJECTIF;
  const done = start - current;
  return Math.max(0, Math.min(100, Math.round((done / total) * 100)));
}

function avgPerteSemaine() {
  if (entries.length < 2) return 0;
  const first = entries[entries.length - 1];
  const last = entries[0];
  const days = (new Date(last.key) - new Date(first.key)) / 86400000;
  if (days <= 0) return 0;
  return +(((first.weight - last.weight) / days) * 7).toFixed(2);
}

async function loadEntries() {
  if (!firebaseReady) { entries = []; return; }
  try {
    const ref = collection(db, 'users', USER_ID, 'pesees');
    const q = query(ref, orderBy('key', 'desc'));
    const snap = await getDocs(q);
    entries = snap.docs.map(d => d.data());
    await loadJournal(journalDate);
  } catch (e) {
    console.error(e);
    entries = [];
  }
}

async function saveEntry(entry) {
  if (!firebaseReady) return false;
  try {
    await setDoc(doc(db, 'users', USER_ID, 'pesees', entry.key), entry);
    return true;
  } catch (e) {
    console.error(e);
    return false;
  }
}

function normalizeWeight(v) {
  if (typeof v !== 'string') v = String(v);
  v = v.replace(',', '.').trim();
  const n = parseFloat(v);
  if (Number.isNaN(n)) return null;
  return +n.toFixed(1);
}

async function submitForm() {
  const weight = normalizeWeight(form.weight);
  if (!weight) {
    alert('Entre un poids valide.');
    return;
  }
  const entry = {
    key: todayKey(),
    weight,
    faim: form.faim,
    fatigue: form.fatigue,
    pas: form.pas,
    note: form.note.trim(),
    ts: Date.now()
  };
  await saveEntry(entry);
  await loadEntries();
  form = { weight: '', faim: 2, fatigue: 2, pas: 'mid', note: '' };
  currentView = 'home';
  render();
}

function ringSvg() {
  const pct = progressPct();
  const r = 52;
  const c = 2 * Math.PI * r;
  const dash = c * pct / 100;
  return `
  <svg width="130" height="130" viewBox="0 0 130 130" aria-hidden="true">
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#E8E0D0" stroke-width="10"/>
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#2A7F6F" stroke-width="10"
      stroke-linecap="round" stroke-dasharray="${dash} ${c-dash}"
      transform="rotate(-90 65 65)"/>
    <text x="65" y="62" text-anchor="middle" font-size="30" font-family="Georgia" font-weight="700" fill="#1A3A4A">${pct}</text>
    <text x="65" y="82" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#6B7A82">%</text>
  </svg>`;
}

function viewHome() {
  const cw = currentWeight();
  const delta = weightDelta();
  const deltaCls = delta === null ? 'neutral' : delta < 0 ? 'good' : delta > 0 ? 'bad' : 'neutral';
  const deltaTxt = delta === null ? 'Première mesure' : delta < 0 ? `${Math.abs(delta)} kg depuis la dernière pesée` : delta > 0 ? `+${delta} kg depuis la dernière pesée` : 'Stable depuis la dernière pesée';

  return `
    <header class="header">
      <h1>Mon suivi santé</h1>
      <p>Objectif 84 kg · 27 juillet 2026</p>
    </header>

    <main class="scroll-zone">
      <section class="card">
        <div class="card-title">Poids actuel</div>
        <div class="ring-wrap">
          <div>${ringSvg()}</div>
          <div>
            <div class="big-num">${cw}<span class="unit"> kg</span></div>
            <div class="delta ${deltaCls}">${deltaTxt}</div>
          </div>
        </div>
      </section>

      <section class="grid2">
        <div class="mini-card">
          <div class="mini-val">${entries.length}</div>
          <div class="mini-label">Pesées enregistrées</div>
        </div>
        <div class="mini-card">
          <div class="mini-val">${avgPerteSemaine()}</div>
          <div class="mini-label">kg / semaine</div>
        </div>
      </section>

      <section class="card">
        <div class="card-title">Aujourd’hui</div>
        <button class="btn-primary" onclick="go('saisie')">Enregistrer une pesée</button>
        <button class="btn-secondary" onclick="go('journal')">Ouvrir le journal repas</button>
      </section>
    </main>
  `;
}

function dots(active, deep = false) {
  let html = `<div class="dots">`;
  for (let i = 1; i <= 5; i++) {
    html += `<span class="dot ${i <= active ? (deep ? 'on-deep' : 'on') : ''}"></span>`;
  }
  html += `</div>`;
  return html;
}

function viewSaisie() {
  return `
    <header class="header">
      <h1>Pesée du jour</h1>
      <p>${formatDateFR(todayKey())}</p>
    </header>

    <main class="scroll-zone">
      <section class="card">
        <label class="field-label">Poids</label>
        <input type="number" step="0.1" inputmode="decimal" placeholder="Ex. 92.4" value="${form.weight}"
          oninput="form.weight=this.value">

        <label class="field-label">Faim ressentie</label>
        <div class="slider-row">
          ${dots(form.faim)}
          <input type="range" min="1" max="5" value="${form.faim}" oninput="form.faim=+this.value;render()">
        </div>

        <label class="field-label">Fatigue</label>
        <div class="slider-row">
          ${dots(form.fatigue, true)}
          <input type="range" min="1" max="5" value="${form.fatigue}" oninput="form.fatigue=+this.value;render()">
        </div>

        <label class="field-label">Pas / activité</label>
        <div class="pas-row">
          <button class="pas-btn ${form.pas==='low'?'active-low':''}" onclick="form.pas='low';render()">Faible</button>
          <button class="pas-btn ${form.pas==='mid'?'active-mid':''}" onclick="form.pas='mid';render()">Moyen</button>
          <button class="pas-btn ${form.pas==='high'?'active-high':''}" onclick="form.pas='high';render()">Élevé</button>
        </div>

        <label class="field-label">Note libre</label>
        <textarea rows="4" placeholder="Énergie, digestion, écarts, sommeil..." oninput="form.note=this.value">${form.note}</textarea>

        <button class="btn-primary" onclick="submitForm()">Enregistrer</button>
      </section>
    </main>
  `;
}

function viewHistorique() {
  return `
    <header class="header">
      <h1>Historique</h1>
      <p>${entries.length} entrée${entries.length > 1 ? 's' : ''}</p>
    </header>

    <main class="scroll-zone">
      <section class="card">
        <div class="card-title">Toutes les pesées</div>
        <div class="entry-list">
          ${entries.length ? entries.map(e => `
            <div class="entry">
              <div>
                <div class="entry-date">${weekdayFR(e.key)} · ${formatDateFR(e.key)}</div>
                <div class="entry-meta">
                  faim ${e.faim}/5 · fatigue ${e.fatigue}/5 · activité ${e.pas}
                </div>
                ${e.note ? `<div class="tag-row"><span class="tag">${e.note}</span></div>` : ''}
              </div>
              <div class="entry-weight">${e.weight} kg</div>
            </div>
          `).join('') : `<div class="empty">Aucune pesée pour l’instant.</div>`}
        </div>
      </section>
    </main>
  `;
}

const MEALS = [
  { name:'Petit-déjeuner type', kcal:380, desc:'Skyr, flocons d’avoine, fruits rouges, noix.', prot:'28g', gluc:'38g', lip:'12g' },
  { name:'Déjeuner méditerranéen', kcal:620, desc:'Poulet, quinoa, légumes rôtis, huile d’olive.', prot:'42g', gluc:'46g', lip:'24g' },
  { name:'Dîner léger', kcal:520, desc:'Saumon, haricots verts, patate douce.', prot:'39g', gluc:'31g', lip:'22g' }
];

function viewRepas() {
  return `
    <header class="header">
      <h1>Repas repères</h1>
      <p>Base simple pour rester régulier</p>
    </header>

    <main class="scroll-zone">
      <section class="card">
        <div class="card-title">Exemples</div>
        <div class="meal-grid">
          ${MEALS.map(m => `
            <div class="meal-card">
              <div class="meal-header">
                <div class="meal-name">${m.name}</div>
                <div class="meal-kcal">${m.kcal} kcal</div>
              </div>
              <div class="meal-desc">${m.desc}</div>
              <div class="macro-row">
                <span>Prot ${m.prot}</span>
                <span>Gluc ${m.gluc}</span>
                <span>Lip ${m.lip}</span>
              </div>
            </div>
          `).join('')}
        </div>
      </section>
    </main>
  `;
}

const ALIMENTS = [
  { nom:'Œuf entier (100g)', cat:'Protéines', kcal:143, prot:13, gluc:1, lip:10 },
  { nom:'Blanc de poulet (100g)', cat:'Protéines', kcal:165, prot:31, gluc:0, lip:3.6 },
  { nom:'Saumon (100g)', cat:'Poissons', kcal:208, prot:20, gluc:0, lip:13 },
  { nom:'Thon nature (100g)', cat:'Poissons', kcal:132, prot:29, gluc:0, lip:1 },
  { nom:'Skyr nature (100g)', cat:'Laitages', kcal:63, prot:11, gluc:4, lip:0.2 },
  { nom:'Yaourt grec 0% (100g)', cat:'Laitages', kcal:59, prot:10, gluc:3.6, lip:0.4 },
  { nom:'Lentilles cuites (100g)', cat:'Légumineuses', kcal:116, prot:9, gluc:20, lip:0.4 },
  { nom:'Pois chiches cuits (100g)', cat:'Légumineuses', kcal:164, prot:8.9, gluc:27, lip:2.6 },
  { nom:'Riz basmati cuit (100g)', cat:'Féculents', kcal:130, prot:2.7, gluc:28, lip:0.3 },
  { nom:'Pommes de terre cuites (100g)', cat:'Féculents', kcal:87, prot:1.9, gluc:20, lip:0.1 },
  { nom:'Patate douce cuite (100g)', cat:'Féculents', kcal:90, prot:2, gluc:21, lip:0.1 },
  { nom:'Flocons d’avoine (100g)', cat:'Petit-déjeuner', kcal:372, prot:13, gluc:60, lip:7 },
  { nom:'Amandes (100g)', cat:'Oléagineux', kcal:579, prot:21, gluc:22, lip:50 },
  { nom:'Noix (100g)', cat:'Oléagineux', kcal:654, prot:15, gluc:14, lip:65 },
  { nom:'Huile d’olive (100g)', cat:'Matières grasses', kcal:884, prot:0, gluc:0, lip:100 },
  { nom:'Brocoli (100g)', cat:'Légumes', kcal:34, prot:2.8, gluc:7, lip:0.4 },
  { nom:'Haricots verts (100g)', cat:'Légumes', kcal:31, prot:1.8, gluc:7, lip:0.1 },
  { nom:'Tomate (100g)', cat:'Légumes', kcal:18, prot:0.9, gluc:3.9, lip:0.2 },
  { nom:'Avocat (100g)', cat:'Légumes gras', kcal:160, prot:2, gluc:9, lip:15 },
  { nom:'Banane (100g)', cat:'Fruits', kcal:89, prot:1.1, gluc:23, lip:0.3 },
  { nom:'Pomme (100g)', cat:'Fruits', kcal:52, prot:0.3, gluc:14, lip:0.2 },
  { nom:'Fruits rouges (100g)', cat:'Fruits', kcal:50, prot:1, gluc:12, lip:0.3 }
];

const KCAL_OBJECTIF = 1900;
const PROT_OBJECTIF = 140;

function getJournalItems(dateKey) {
  return journal[dateKey] || [];
}

function getJournalBilan(dateKey) {
  const items = getJournalItems(dateKey);
  return items.reduce((acc, i) => {
    const f = i.qty / 100;
    acc.kcal += Math.round(i.kcal * f);
    acc.prot += Math.round(i.prot * f);
    acc.gluc += Math.round(i.gluc * f);
    acc.lip += Math.round(i.lip * f);
    return acc;
  }, { kcal:0, prot:0, gluc:0, lip:0 });
}

async function loadJournal(dateKey) {
  if (!firebaseReady) { journal[dateKey] = journal[dateKey] || []; return; }
  try {
    const ref = doc(db, 'users', USER_ID, 'journal', dateKey);
    const snap = await getDoc(ref);
    journal[dateKey] = snap.exists() ? (snap.data().items || []) : [];
  } catch (e) {
    console.error(e);
    journal[dateKey] = [];
  }
}

async function saveJournalDay(dateKey) {
  if (!firebaseReady) return false;
  try {
    const items = journal[dateKey] || [];
    await setDoc(doc(db, 'users', USER_ID, 'journal', dateKey), { items, updatedAt: Date.now() });
    return true;
  } catch (e) {
    console.error(e);
    return false;
  }
}

function dateLabel(key) {
  const d = new Date(`${key}T12:00:00`);
  const today = todayKey();
  if (key === today) return "Aujourd’hui";
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

async function shiftJournalDate(delta) {
  const d = new Date(journalDate);
  d.setDate(d.getDate() + delta);
  const today = new Date();
  if (d > today) return;
  journalDate = d.toISOString().slice(0, 10);
  if (!journal[journalDate]) {
    showLoader('Chargement du journal…');
    await loadJournal(journalDate);
  }
  render();
}

async function addAlimentToJournal() {
  const qty = parseFloat(pendingQty);
  if (!pendingAliment || isNaN(qty) || qty <= 0) return;
  if (!journal[journalDate]) journal[journalDate] = [];
  journal[journalDate].push({
    id: Date.now(),
    nom: pendingAliment.nom,
    kcal: pendingAliment.kcal,
    prot: pendingAliment.prot,
    gluc: pendingAliment.gluc,
    lip: pendingAliment.lip,
    qty,
    moment: journalMoment
  });
  await saveJournalDay(journalDate);
  pendingAliment = null;
  pendingQty = '100';
  journalSearch = '';
  render();
}

async function removeJournalItem(dateKey, id) {
  if (!journal[dateKey]) return;
  journal[dateKey] = journal[dateKey].filter(i => i.id !== id);
  await saveJournalDay(dateKey);
  render();
}

function openQtyModal(index) {
  const filtered = ALIMENTS.filter(a =>
    journalSearch.length < 2 ? false : a.nom.toLowerCase().includes(journalSearch.toLowerCase()) || a.cat.toLowerCase().includes(journalSearch.toLowerCase())
  );
  pendingAliment = filtered[index];
  pendingQty = '100';
  render();
}

function viewJournal() {
  const bilan = getJournalBilan(journalDate);
  const kcalPct = Math.min(100, Math.round((bilan.kcal / KCAL_OBJECTIF) * 100));
  const protPct = Math.min(100, Math.round((bilan.prot / PROT_OBJECTIF) * 100));
  const kcalClass = bilan.kcal > KCAL_OBJECTIF * 1.1 ? 'over' : bilan.kcal > KCAL_OBJECTIF * 0.8 ? 'ok' : 'warn';
  const protClass = bilan.prot >= PROT_OBJECTIF ? 'ok' : bilan.prot >= PROT_OBJECTIF * 0.7 ? 'warn' : 'over';

  const filtered = journalSearch.length >= 2
    ? ALIMENTS.filter(a => a.nom.toLowerCase().includes(journalSearch.toLowerCase()) || a.cat.toLowerCase().includes(journalSearch.toLowerCase())).slice(0, 15)
    : [];

  const items = getJournalItems(journalDate);
  const moments = ['Matin', 'Déjeuner', 'Collation', 'Dîner'];
  const momentIcons = { Matin:'🌅', Déjeuner:'☀️', Collation:'🍎', Dîner:'🌙' };

  let journalHtml = '';
  moments.forEach(m => {
    const mItems = items.filter(i => i.moment === m);
    if (mItems.length === 0) return;
    const mKcal = mItems.reduce((s, i) => s + Math.round(i.kcal * i.qty / 100), 0);
    journalHtml += `<div class="meal-section">
      <div class="meal-section-title">${momentIcons[m]} ${m} · ${mKcal} kcal</div>
      ${mItems.map(i => {
        const k = Math.round(i.kcal * i.qty / 100);
        const p = Math.round(i.prot * i.qty / 100);
        return `<div class="journal-item">
          <div>
            <div class="journal-item-name">${i.nom.replace(/\(100g\)/,'').replace(/\(.*?\)/,'').trim()} ${i.qty !== 100 ? `· ${i.qty}g` : ''}</div>
            <div class="journal-item-detail">${k} kcal · ${p}g prot</div>
          </div>
          <button class="journal-delete" onclick="removeJournalItem('${journalDate}', ${i.id})">×</button>
        </div>`;
      }).join('')}
    </div>`;
  });

  const modalHtml = pendingAliment ? `
    <div class="overlay" onclick="pendingAliment=null;render()"></div>
    <div class="qty-modal">
      <h3>${pendingAliment.nom.replace(/\(100g\)/,'').trim()}</h3>
      <p>${pendingAliment.cat} · base 100g : ${pendingAliment.kcal} kcal · ${pendingAliment.prot}g prot</p>
      <div style="margin-bottom:10px">
        <label class="field-label">Moment du repas</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${moments.map(m => `<button id="mbtn-${m}" style="padding:6px 12px;border-radius:20px;font-size:12px;font-family:sans-serif;border:1.5px solid ${journalMoment===m?'var(--teal)':'var(--border)'};background:${journalMoment===m?'var(--teal-light)':'transparent'};color:${journalMoment===m?'var(--teal)':'var(--muted)'};cursor:pointer;font-weight:${journalMoment===m?700:400}" onclick="setMoment('${m}')">${momentIcons[m]} ${m}</button>`).join('')}
        </div>
      </div>
      <div class="qty-row">
        <input class="qty-input" type="number" id="qty-inp" value="${pendingQty}" min="1" max="2000" oninput="pendingQty=this.value;renderQtyPreview()" inputmode="decimal">
        <span class="qty-unit">grammes</span>
      </div>
      <div class="qty-preview" id="qty-preview">
        ${(() => { const f = parseFloat(pendingQty)/100; return `<span>⚡ ${Math.round(pendingAliment.kcal*f)} kcal</span><span>💪 ${Math.round(pendingAliment.prot*f)}g prot</span><span>🌾 ${Math.round(pendingAliment.gluc*f)}g gluc</span>`; })()}
      </div>
      <button class="btn-primary" onclick="addAlimentToJournal()">Ajouter au journal</button>
    </div>` : '';

  return `
    <header class="header">
      <h1>Journal repas</h1>
      <p>${dateLabel(journalDate)}</p>
    </header>

    <main class="scroll-zone">
      <div class="date-nav">
        <button class="date-nav-btn" onclick="shiftJournalDate(-1)">‹</button>
        <span class="date-nav-label">${dateLabel(journalDate)}</span>
        <button class="date-nav-btn" onclick="shiftJournalDate(1)" ${journalDate === todayKey() ? 'disabled style="opacity:0.3"' : ''}>›</button>
      </div>

      <div class="bilan-bar">
        <div class="bilan-cell"><div class="bilan-val ${kcalClass}">${bilan.kcal}</div><div class="bilan-label">kcal</div></div>
        <div class="bilan-cell"><div class="bilan-val ${protClass}">${bilan.prot}g</div><div class="bilan-label">protéines</div></div>
        <div class="bilan-cell"><div class="bilan-val">${bilan.gluc}g</div><div class="bilan-label">glucides</div></div>
        <div class="bilan-cell"><div class="bilan-val">${bilan.lip}g</div><div class="bilan-label">lipides</div></div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label"><span>Calories</span><span>${bilan.kcal} / ${KCAL_OBJECTIF} kcal</span></div>
        <div class="progress-track"><div class="progress-fill-bar" style="width:${kcalPct}%;background:${bilan.kcal > KCAL_OBJECTIF * 1.1 ? 'var(--terra)' : 'var(--teal)'}"></div></div>
      </div>
      <div class="progress-wrap" style="margin-top:6px">
        <div class="progress-label"><span>Protéines</span><span>${bilan.prot} / ${PROT_OBJECTIF}g</span></div>
        <div class="progress-track"><div class="progress-fill-bar" style="width:${protPct}%;background:var(--deep)"></div></div>
      </div>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Ajouter un aliment… (ex: saumon, œuf, skyr)" value="${journalSearch}"
          oninput="journalSearch=this.value;document.getElementById('aliments-res').innerHTML=renderAlimentsList()" id="journal-search">
      </div>

      <div id="aliments-res">
        ${filtered.length > 0 ? `<div class="aliments-list">${filtered.map((a, i) => `
          <div class="aliment-row">
            <div>
              <div class="aliment-name">${a.nom}</div>
              <div class="aliment-macros">${a.kcal} kcal · ${a.prot}g prot · ${a.gluc}g gluc · ${a.lip}g lip</div>
            </div>
            <button class="aliment-add" onclick="openQtyModal(${i})">+</button>
          </div>`).join('')}</div>` : journalSearch.length >= 2 ? `<div style="margin:8px 16px;font-size:13px;font-family:sans-serif;color:var(--muted)">Aucun résultat pour "${journalSearch}"</div>` : ''}
      </div>

      ${items.length > 0 ? journalHtml : `<div class="empty" style="padding-top:16px">Aucun aliment enregistré.<br>Tape le nom d'un aliment ci-dessus.${journalDate !== todayKey() ? '<br><span style="font-size:12px">Jour passé — édition possible.</span>' : ''}</div>`}

      <div style="height:16px"></div>
      ${modalHtml}
    </main>
  `;
}

function renderAlimentsList() {
  const filtered = journalSearch.length >= 2
    ? ALIMENTS.filter(a => a.nom.toLowerCase().includes(journalSearch.toLowerCase()) || a.cat.toLowerCase().includes(journalSearch.toLowerCase())).slice(0, 15)
    : [];
  if (filtered.length === 0) return journalSearch.length >= 2 ? `<div style="margin:8px 16px;font-size:13px;font-family:sans-serif;color:var(--muted)">Aucun résultat.</div>` : '';
  return `<div class="aliments-list">${filtered.map((a, i) => `
    <div class="aliment-row">
      <div>
        <div class="aliment-name">${a.nom}</div>
        <div class="aliment-macros">${a.kcal} kcal · ${a.prot}g prot · ${a.gluc}g gluc · ${a.lip}g lip</div>
      </div>
      <button class="aliment-add" onclick="openQtyModal(${i})">+</button>
    </div>`).join('')}</div>`;
}

function setMoment(m) {
  journalMoment = m;
  render();
}

function renderQtyPreview() {
  const box = document.getElementById('qty-preview');
  if (!box || !pendingAliment) return;
  const f = Math.max(0, parseFloat(pendingQty || '0')) / 100;
  box.innerHTML = `<span>⚡ ${Math.round(pendingAliment.kcal*f)} kcal</span><span>💪 ${Math.round(pendingAliment.prot*f)}g prot</span><span>🌾 ${Math.round(pendingAliment.gluc*f)}g gluc</span>`;
}

function render() {
  const views = { home: viewHome, saisie: viewSaisie, historique: viewHistorique, repas: viewRepas, journal: viewJournal };
  app.innerHTML = `
    ${views[currentView]()}
    <nav>
      <button class="${currentView==='home'?'active':''}" onclick="go('home')"><span class="ico">⌂</span>Accueil</button>
      <button class="${currentView==='saisie'?'active':''}" onclick="go('saisie')"><span class="ico">⚖︎</span>Peser</button>
      <button class="${currentView==='historique'?'active':''}" onclick="go('historique')"><span class="ico">◔</span>Historique</button>
      <button class="${currentView==='repas'?'active':''}" onclick="go('repas')"><span class="ico">◌</span>Repas</button>
      <button class="${currentView==='journal'?'active':''}" onclick="go('journal')"><span class="ico">✎</span>Journal</button>
    </nav>
  `;
  if (pendingAliment) renderQtyPreview();
}

function go(view) {
  currentView = view;
  if (currentView === 'journal' && !journal[journalDate]) {
    showLoader('Chargement du journal…');
    loadJournal(journalDate).then(() => render());
    return;
  }
  if (currentView === 'home') render();
  else render();
}

// Expose inline handlers
window.go = go;
window.submitForm = submitForm;
window.shiftJournalDate = shiftJournalDate;
window.openQtyModal = openQtyModal;
window.setMoment = setMoment;
window.addAlimentToJournal = addAlimentToJournal;
window.removeJournalItem = removeJournalItem;
window.renderQtyPreview = renderQtyPreview;
window.renderAlimentsList = renderAlimentsList;
window.form = form;
window.pendingAliment = pendingAliment;
window.pendingQty = pendingQty;
window.journalSearch = journalSearch;
window.journalMoment = journalMoment;

// Sync globals for inline handlers
setInterval(() => {
  window.form = form;
  window.pendingAliment = pendingAliment;
  window.pendingQty = pendingQty;
  window.journalSearch = journalSearch;
  window.journalMoment = journalMoment;
}, 250);

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration skipped:', err));
}

// Start
showLoader('Connexion…');
signInAnonymously(auth)
  .then(() => loadEntries())
  .then(() => render())
  .catch((error) => {
    firebaseReady = false;
    console.warn('Firebase anonymous auth unavailable, fallback local mode:', error);
    loadEntries().then(() => render());
  });

firebaseReady = true;
</script>
</body>
</html>
