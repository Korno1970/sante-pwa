<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Santé">

<title>Suivi Santé</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232736;
  --border: rgba(255,255,255,0.07);
  --text: #e8eaf0;
  --muted: #6b7280;
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.1);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.1);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }

#app {
  max-width: 480px; margin: 0 auto;
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  padding: calc(14px + var(--safe-top)) 20px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.header-left p { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; font-weight: 300; }
.header-badge {
  font-size: 11px; font-family: 'DM Mono', monospace;
  background: var(--green-dim); color: var(--green);
  padding: 4px 10px; border-radius: 20px; font-weight: 400;
}
.header-badge.offline { background: var(--amber-dim); color: var(--amber); }

/* SCROLL */
.scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* NAV */
nav {
  flex-shrink: 0;
  display: flex; background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
}
nav button {
  flex: 1; background: none; border: none; cursor: pointer;
  padding: 12px 4px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase;
  transition: color 0.15s;
}
nav button.active { color: var(--green); }
nav button .ico { font-size: 18px; line-height: 1; }

/* CARDS */
.card {
  background: var(--surface); border-radius: 16px;
  margin: 14px 14px 0; padding: 18px;
  border: 1px solid var(--border);
}
.card-label {
  font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 400;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.spacer { height: 14px; }

/* RING */
.ring-wrap { display: flex; align-items: center; gap: 20px; }
.poids-big { font-size: 42px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
.poids-unit { font-size: 16px; color: var(--muted); font-weight: 600; }
.poids-delta { font-size: 12px; font-family: 'DM Mono', monospace; margin-top: 6px; }
.poids-delta.good { color: var(--green); }
.poids-delta.bad { color: var(--red); }
.poids-delta.neutral { color: var(--muted); }

/* STATS GRID */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 14px 0; }
.stat-card { background: var(--surface); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
.stat-val { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
.stat-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 4px; }

/* BILAN BAR */
.bilan-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 14px 0; }
.bilan-cell { background: var(--surface); border-radius: 10px; padding: 10px 6px; text-align: center; border: 1px solid var(--border); }
.bilan-val { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
.bilan-label { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 3px; letter-spacing: 0.05em; }
.bilan-val.ok { color: var(--green); }
.bilan-val.over { color: var(--red); }

/* ALERT BOX */
.alert { margin: 10px 14px 0; border-radius: 12px; padding: 12px 14px; font-size: 12px; font-family: 'DM Mono', monospace; line-height: 1.5; }
.alert.green { background: var(--green-dim); color: var(--green); }
.alert.amber { background: var(--amber-dim); color: var(--amber); }
.alert.red { background: var(--red-dim); color: var(--red); }

/* FORM */
label.lbl { display: block; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
input[type=number], input[type=text], textarea {
  width: 100%; padding: 12px 14px; font-size: 16px;
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--surface2); color: var(--text);
  font-family: 'Syne', sans-serif; outline: none; margin-bottom: 14px;
  -webkit-appearance: none;
}
input[type=number]:focus, input[type=text]:focus, textarea:focus {
  border-color: rgba(74,222,128,0.4);
}
textarea { resize: none; line-height: 1.5; }
input[type=range] { width: 100%; accent-color: var(--green); margin-bottom: 0; }
.slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.dots { display: flex; gap: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.on { background: var(--green); }
.dot.deep { background: var(--blue); }

.pas-row { display: flex; gap: 8px; margin-bottom: 14px; }
.pas-btn { flex: 1; padding: 10px 4px; font-size: 11px; font-family: 'DM Mono', monospace; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.pas-btn.low  { border-color: var(--red);   background: var(--red-dim);   color: var(--red);   font-weight: 500; }
.pas-btn.mid  { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); font-weight: 500; }
.pas-btn.high { border-color: var(--green); background: var(--green-dim); color: var(--green); font-weight: 500; }

/* BUTTONS */
.btn { width: 100%; padding: 14px; font-size: 14px; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0.05em; border: none; border-radius: 12px; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; text-transform: uppercase; }
.btn:active { opacity: 0.75; }
.btn-green { background: var(--green); color: #0f1117; }
.btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-blue  { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }

/* HISTORIQUE */
.hist-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.hist-item:last-child { border-bottom: none; }
.hist-top { display: flex; justify-content: space-between; align-items: flex-start; }
.hist-date { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
.hist-poids { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-top: 2px; }
.chip { font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.chip-green { background: var(--green-dim); color: var(--green); }
.chip-red   { background: var(--red-dim);   color: var(--red); }
.chip-gray  { background: var(--surface2);  color: var(--muted); }
.hist-meta { display: flex; gap: 10px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.hist-note { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 6px; font-style: italic; line-height: 1.5; }

/* PLAN REPAS */
.day-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 0 14px; margin-top: 14px; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab { flex: 0 0 auto; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.day-tab.active { background: var(--green-dim); color: var(--green); border-color: rgba(74,222,128,0.3); }
.meal-card { background: var(--surface); border-radius: 14px; margin: 8px 14px 0; border: 1px solid var(--border); padding: 14px 16px; }
.meal-time { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
.meal-name { font-size: 15px; font-weight: 700; margin: 4px 0 3px; }
.meal-kcal { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--green); }
.meal-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 4px; }

/* JOURNAL */
.log-item { background: var(--surface); border-radius: 10px; padding: 11px 14px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; }
.log-name { font-size: 13px; font-weight: 600; }
.log-detail { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 3px; }
.log-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 0 0 6px; flex-shrink: 0; line-height: 1; }

/* IA */
.ai-box { margin: 10px 14px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.ai-head { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 10px; font-family: 'DM Mono', monospace; color: var(--green); letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
.ai-head::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }
.ai-body { padding: 14px; font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; font-family: 'DM Mono', monospace; font-weight: 300; }
.ai-loading { color: var(--muted); }

/* CHAT */
.chat-wrap { display: flex; flex-direction: column; gap: 0; padding: 0 14px; }
.chat-msg { margin-bottom: 10px; }
.chat-msg.user .bubble {
  background: var(--green-dim); color: var(--green);
  border-radius: 14px 14px 4px 14px; padding: 10px 13px;
  font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 400;
  line-height: 1.5; margin-left: 30px;
}
.chat-msg.ai .bubble {
  background: var(--surface2); color: var(--text);
  border-radius: 4px 14px 14px 14px; padding: 10px 13px;
  font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 300;
  line-height: 1.6; margin-right: 30px; white-space: pre-wrap;
}
.chat-msg.ai.loading .bubble { color: var(--muted); }
.chat-input-wrap {
  position: sticky; bottom: 0;
  background: var(--bg); border-top: 1px solid var(--border);
  padding: 10px 14px; display: flex; gap: 8px; align-items: flex-end;
}
.chat-input {
  flex: 1; padding: 10px 13px; font-size: 14px;
  border: 1px solid var(--border); border-radius: 12px;
  background: var(--surface); color: var(--text);
  font-family: 'DM Mono', monospace; outline: none;
  resize: none; max-height: 100px; line-height: 1.4;
  margin-bottom: 0;
}
.chat-input:focus { border-color: rgba(74,222,128,0.4); }
.chat-send {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--green); color: #0f1117;
  border: none; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-weight: 700;
}

.empty { text-align: center; padding: 40px 20px; font-family: 'DM Mono', monospace; color: var(--muted); font-size: 13px; line-height: 1.6; }

    </div>
    <div class="header-badge offline" id="fb-status">local</div>
  </div>
  <div class="scroll" id="main"></div>
  <nav id="nav">
    <button class="active" onclick="goTo('journal')" id="nav-journal">
      <span class="ico">📋</span>Journal
    </button>
    <button onclick="goTo('coach')" id="nav-coach">
      <span class="ico">🤖</span>Coach IA

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { initializeFirestore, doc, getDoc, setDoc, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// ═══ FIREBASE ═══
const fbApp = initializeApp({
  apiKey: "AIzaSyBMtwIOSSSTIkNLh5nIDXmEH4WD-5jdGIM",
  authDomain: "pwa---sante.firebaseapp.com",
  projectId: "pwa---sante",
  storageBucket: "pwa---sante.firebasestorage.app",
  messagingSenderId: "99523195154",
  appId: "1:99523195154:web:760668e987669a5e1303cb"
});
const db = initializeFirestore(fbApp, { experimentalForceLongPolling: true, useFetchStreams: false });
const auth = getAuth(fbApp);

// ═══ CONSTANTES ═══
const UID = 'sylvain';
const DEPART = 94, OBJECTIF = 84;
const KCAL_OBJ = 1500, PROT_OBJ = 90;

// ═══ ÉTAT ═══
let fb = false;
let entries = [];
let view = 'journal';
let dayIdx = 0;
let journal = {};
let chatHistory = [];
let form = { poids: '', moral: 3, plan: 3, pas: 'mid', note: '' };
let journalAi = '';
let chatLoading = false;

// ═══ PLAN REPAS ═══
const DAYS = [
  { nom: 'Lundi–Jeudi', meals: [
    { t: 'Matin',  n: 'Skyr + flocons + fruits rouges', k: 320, d: 'Protéiné, rassasiant, fibres.' },
    { t: 'Midi',   n: 'Poulet / poisson + quinoa + légumes', k: 520, d: 'Base méditerranéenne solide.' },
    { t: 'Soir',   n: 'Saumon + haricots verts + patate douce', k: 520, d: 'Oméga-3, légumes, féculents modérés.' }
  ]},
  { nom: 'Vendredi', meals: [
    { t: 'Matin', n: 'Omelette + fruit', k: 300, d: 'Léger pour garder de la marge.' },
    { t: 'Midi',  n: 'Salade protéinée complète', k: 450, d: 'Volumineux sans excès.' },
    { t: 'Soir',  n: 'Festin libre assumé', k: 900, d: 'Sans culpabilité. Reprendre le plan samedi.' }
  ]},
  { nom: 'Week-end', meals: [
    { t: 'Matin', n: 'Yaourt grec + noix + pomme', k: 340, d: 'Simple et stable.' },
    { t: 'Midi',  n: 'Poisson + riz complet + crudités', k: 530, d: 'Assiette complète méditerranéenne.' },
    { t: 'Soir',  n: 'Soupe + oeufs + tartine seigle', k: 400, d: 'Léger et satisfaisant.' }
  ]}
];

// ═══ UTILS ═══
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function lsGet(k, fb) { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch(e) { return fb; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

function todayKey() {
  const d = new Date(); d.setHours(12,0,0,0);
  return d.toISOString().slice(0,10);
}
function weekKey() {
  const d = new Date(); d.setHours(12,0,0,0);
  const diff = d.getDay() === 0 ? -6 : 1 - d.getDay();
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}
function weekLabel(k) {
  return new Date(k + 'T12:00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
}
function daysLeft() {
  return Math.max(0, Math.ceil((new Date('2026-07-27T12:00:00') - new Date()) / 86400000));
}
function pasLbl(v) { return v==='low'?'< 5 000 pas':v==='mid'?'5–10k pas':'> 10 000 pas'; }
function pasClr(v) { return v==='low'?'var(--red)':v==='mid'?'var(--amber)':'var(--green)'; }

function dots(n, cls) {
  return '<div class="dots">' + Array.from({length:5},(_,i)=>'<span class="dot'+(i<n?' '+(cls||'on'):'')+'"></span>').join('') + '</div>';
}

function ring(pct) {
  const r=48, c=2*Math.PI*r, dash=c*pct/100;
  return `<svg width="110" height="110" viewBox="0 0 110 110">
    <circle cx="55" cy="55" r="${r}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="9"/>
    <circle cx="55" cy="55" r="${r}" fill="none" stroke="#4ade80" stroke-width="9"
      stroke-linecap="round" stroke-dasharray="${dash} ${c-dash}" transform="rotate(-90 55 55)"/>
    <text x="55" y="51" text-anchor="middle" font-size="22" font-family="Syne,sans-serif" font-weight="800" fill="#e8eaf0">${pct}</text>
    <text x="55" y="68" text-anchor="middle" font-size="10" font-family="DM Mono,monospace" fill="#6b7280">%</text>
  </svg>`;
}

// ═══ FIREBASE DATA ═══
async function loadEntries() {
  if (!fb) { entries = lsGet('pesees', []); return; }
  try {
    const snap = await getDocs(query(collection(db,'users',UID,'pesees'), orderBy('key','desc')));
    entries = snap.docs.map(d => d.data());
    lsSet('pesees', entries);
  } catch(e) { entries = lsGet('pesees', []); }
}

async function saveEntry(e) {
  lsSet('pesees', entries);
  if (!fb) return;
  try { await setDoc(doc(db,'users',UID,'pesees',e.key), e); } catch(_) {}
}

async function loadJournal() {
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-i);
    const k = d.toISOString().slice(0,10);
    journal[k] = lsGet('j_'+k, []);
    if (!fb) continue;
    try {
      const snap = await getDoc(doc(db,'users',UID,'journal',k));
      if (snap.exists()) {
        const items = snap.data().items || [];
        if (items.length > 0) { journal[k] = items; lsSet('j_'+k, items); }
      }
    } catch(e) {}
  }
}

async function saveJournal() {
  const k = todayKey();
  lsSet('j_'+k, journal[k]||[]);
  if (!fb) return;
  try {
    await setDoc(doc(db,'users',UID,'journal',k), {
      items: (journal[k]||[]).map(x => ({
        id: x.id, nom: x.nom||'', kcal: x.kcal||0,
        prot: x.prot||0, gluc: x.gluc||0, lip: x.lip||0,
        qty: x.qty||100, moment: x.moment||''
      })),
      updatedAt: Date.now()
    });
  } catch(e) {}
}

// ═══ JOURNAL ═══
function todayItems() { return journal[todayKey()] || []; }
function totals() {
  return todayItems().reduce((a,x) => ({
    k: a.k+(x.kcal||x.k||0),
    p: a.p+(x.prot||x.p||0),
    g: a.g+(x.gluc||x.g||0),
    l: a.l+(x.lip||x.l||0)
  }), {k:0,p:0,g:0,l:0});
}
function getName(x) { return x.nom||x.n||x.name||''; }
function getKcal(x) { return x.kcal||x.k||0; }
function getProt(x) { return x.prot||x.p||0; }

function addJournalEntry(text) {
  const k = todayKey();
  if (!journal[k]) journal[k] = [];
  journal[k].push({ id: Date.now(), nom: text.trim(), kcal: 0, prot: 0, gluc: 0, lip: 0, qty: 0, moment: '' });
  saveJournal();
}

function removeFood(id) {
  const k = todayKey();
  journal[k] = (journal[k]||[]).filter(x => x.id !== id);
  saveJournal().then(() => render());
}

// ═══ IA CLAUDE ═══
async function askClaude(msgs) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 800,
      system: `Tu es le coach santé de Sylvain. Profil : 55 ans, 174cm, départ 94kg, objectif 84kg au 27 juillet 2026. Régime méditerranéen-protéiné : 1400-1600 kcal/j, 90g protéines minimum. Sous Kardégic. Festin le vendredi soir. Actif : 5000 à 10000 pas/jour. Réponds en français, ton direct et bienveillant, concis (8 lignes max sauf si demande détaillée). Pas de mise en garde médicale répétée.`,
      messages: msgs
    })
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error || 'Erreur API');
  return d.content.find(x => x.type==='text')?.text || '';
}

async function analyseJournal() {
  const items = todayItems();
  if (!items.length) { alert('Ajoute d\'abord des repas dans le journal.'); return; }
  journalAi = 'Analyse en cours...';
  render();
  const t = totals();
  const liste = items.map(x => getName(x) + (getKcal(x) ? ' (' + getKcal(x) + ' kcal)' : '')).join(', ');
  try {
    journalAi = await askClaude([{ role: 'user', content:
      `Analyse mon journal du jour.\nAliments : ${liste}\nTotaux : ${t.k} kcal, ${t.p}g prot, ${t.g}g gluc, ${t.l}g lip.\nObjectifs : ${KCAL_OBJ} kcal, ${PROT_OBJ}g prot.\nDonne : qualité globale, point fort, point à corriger, un ajustement concret.`
    }]);
  } catch(err) { journalAi = 'Erreur : ' + err.message; }
  render();
}

async function sendChat(text) {
  if (!text.trim() || chatLoading) return;
  chatHistory.push({ role: 'user', content: text.trim() });
  chatLoading = true;
  render();
  scrollChatBottom();
  const t = totals();
  const items = todayItems();
  const context = items.length
    ? `\n[Contexte : journal du jour = ${items.map(x=>getName(x)).join(', ')} — ${t.k} kcal, ${t.p}g prot]`
    : '';
  const msgs = chatHistory.map((m,i) => i === 0 && items.length
    ? { role: m.role, content: m.content + context }
    : m
  );
  try {
    const reply = await askClaude(msgs);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(err) {
    chatHistory.push({ role: 'assistant', content: 'Erreur : ' + err.message });
  }
  chatLoading = false;
  render();
  scrollChatBottom();
}

function scrollChatBottom() {
  setTimeout(() => { $('main').scrollTop = $('main').scrollHeight; }, 50);
}

// ═══ PESÉE ═══
function normalizeWeightInput(value) {
  return String(value ?? '').trim().replace(/\s+/g, '').replace(',', '.');
}

function parseWeightKg(value) {
  const normalized = normalizeWeightInput(value);
  if (!normalized || !/^\d+(?:\.\d+)?$/.test(normalized)) return NaN;
  return Number(normalized);
}

function formatWeightKg(value) {
  const n = parseWeightKg(value);
  return Number.isFinite(n) ? n.toFixed(1).replace('.', ',') : '';
}

function submitForm() {
  const inputEl = document.getElementById('input-poids');
  const rawVal = inputEl ? inputEl.value : form.poids;
  const p = parseWeightKg(rawVal);

  if (!Number.isFinite(p) || p < 40 || p > 250) {
    alert('Saisis un poids valide en kilos, par exemple 84,2 ou 84.2');
    return;
  }

  const k = weekKey();
  entries = [
    { key: k, poids: p, moral: form.moral, plan: form.plan, pas: form.pas, note: form.note.trim() },
    ...entries.filter(e => e.key !== k)
  ].sort((a,b) => b.key.localeCompare(a.key));
  saveEntry(entries[0]);
  form = { poids: '', moral: 3, plan: 3, pas: 'mid', note: '' };
  goTo('historique');
}

// ═══ VUES ═══
function vJournal() {
  const t = totals();
  const items = todayItems();
  const kcalOk = t.k <= KCAL_OBJ;
  const protOk = t.p >= PROT_OBJ;

  const bilanBar = `<div class="bilan-grid">
    <div class="bilan-cell"><div class="bilan-val ${kcalOk?'ok':'over'}">${t.k}</div><div class="bilan-label">kcal</div></div>
    <div class="bilan-cell"><div class="bilan-val ${protOk?'ok':'over'}">${t.p}g</div><div class="bilan-label">prot</div></div>
    <div class="bilan-cell"><div class="bilan-val">${t.g}g</div><div class="bilan-label">gluc</div></div>
    <div class="bilan-cell"><div class="bilan-val">${t.l}g</div><div class="bilan-label">lip</div></div>
  </div>`;

  const alertMsg = t.k === 0
    ? '<div class="alert green">Objectif : ' + KCAL_OBJ + ' kcal · ' + PROT_OBJ + 'g protéines</div>'
    : t.k > KCAL_OBJ
    ? '<div class="alert red">+' + (t.k - KCAL_OBJ) + ' kcal au-dessus de l\'objectif</div>'
    : '<div class="alert green">' + (KCAL_OBJ - t.k) + ' kcal restantes</div>';

  const saisie = `<div class="card" style="margin-top:14px">
    <div class="card-label">Saisie du repas</div>
    <textarea id="journal-input" rows="3" placeholder="Décris ce que tu as mangé... ex: bol de quinoa avec saumon grillé et épinards" style="margin-bottom:8px"></textarea>
    <button class="btn btn-green" onclick="handleJournalAdd()">Ajouter au journal</button>
  </div>`;

  const logHtml = items.length
    ? '<div style="margin:10px 14px 0">' + items.map(x =>
        `<div class="log-item">
          <div>
            <div class="log-name">${esc(getName(x))}</div>
            <div class="log-detail">${getKcal(x)?getKcal(x)+' kcal · ':''} ${getProt(x)?getProt(x)+'g prot':''}</div>
          </div>
          <button class="log-del" onclick="removeFood(${x.id})">×</button>
        </div>`
      ).join('') + '</div>'
    : '<div class="empty">Aucun repas enregistré aujourd\'hui.<br>Décris ce que tu as mangé ci-dessus.</div>';

  const aiSection = journalAi
    ? `<div class="ai-box"><div class="ai-head">Analyse du jour</div><div class="ai-body${journalAi==='Analyse en cours...'?' ai-loading':''}">${esc(journalAi)}</div></div>`
    : '';

  const aiBtn = items.length
    ? '<div style="margin:10px 14px 0"><button class="btn btn-blue" onclick="analyseJournal()">Analyser ma journée avec l\'IA</button></div>'
    : '';

  return bilanBar + alertMsg + saisie + logHtml + aiBtn + aiSection + '<div class="spacer"></div>';
}

function vCoach() {
  const msgs = chatHistory.map((m,i) => {
    const isLast = i === chatHistory.length - 1;
    const loading = isLast && chatLoading && m.role === 'user';
    const cls = m.role === 'user' ? 'user' : ('ai' + (loading ? ' loading' : ''));
    return `<div class="chat-msg ${cls}"><div class="bubble">${esc(m.content)}${loading ? '<br><br>...' : ''}</div></div>`;
  }).join('');

  const empty = !chatHistory.length
    ? `<div class="empty" style="padding-top:30px">
        Pose-moi une question sur ton régime,<br>tes repas, tes progrès...<br><br>
        <span style="font-size:24px">🤖</span>
      </div>`
    : '';

  return `<div style="padding-top:14px">
    <div class="chat-wrap">${empty}${msgs}</div>
    <div class="chat-input-wrap" id="chat-input-wrap">
      <textarea class="chat-input" id="chat-input" rows="1" placeholder="Ta question..."></textarea>
      <button class="chat-send" onclick="handleChat()">↑</button>
    </div>
  </div>`;
}

  ).join('');
  const meals = d.meals.map(m =>
    `<div class="meal-card">
      <div class="meal-time">${m.t}</div>
      <div class="meal-name">${m.n}</div>
      <div class="meal-kcal">${m.k} kcal</div>
      <div class="meal-desc">${m.d}</div>
    </div>`
  ).join('');
  return `<div class="day-tabs">${tabs}</div>${meals}<div class="spacer"></div>`;
}

function vHistorique() {
  if (!entries.length) return '<div class="empty">Aucune pesée enregistrée.<br>Va dans Pesée pour commencer.</div>';
  const e0 = entries[0], prev = entries[1];
  const pct = Math.max(0, Math.min(100, Math.round((DEPART - e0.poids) / (DEPART - OBJECTIF) * 100)));
  const delta = prev ? e0.poids - prev.poids : null;
  const avg = entries.length < 2 ? 0 : (() => {
    const o = entries[entries.length-1], n = entries[0];
    const d = (new Date(n.key) - new Date(o.key)) / 86400000;
    return d > 0 ? +((o.poids - n.poids) / d * 7).toFixed(2) : 0;
  })();

  const deltaHtml = delta === null
    ? '<div class="poids-delta neutral">Première mesure</div>'
    : delta < 0 ? '<div class="poids-delta good">−' + Math.abs(delta).toFixed(1) + ' kg cette semaine</div>'
    : delta > 0 ? '<div class="poids-delta bad">+' + delta.toFixed(1) + ' kg cette semaine</div>'
    : '<div class="poids-delta neutral">Stable</div>';

  const summary = `<div class="card">
    <div class="card-label">Progression</div>
    <div class="ring-wrap">
      <div>${ring(pct)}</div>
      <div>
        <div class="poids-big">${e0.poids.toFixed(1)} <span class="poids-unit">kg</span></div>
        ${deltaHtml}
      </div>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${daysLeft()}</div><div class="stat-label">jours restants</div></div>
    <div class="stat-card"><div class="stat-val">${avg > 0 ? avg : '—'}</div><div class="stat-label">kg / semaine</div></div>
  </div>`;

  const rows = entries.map((e,i) => {
    const p = entries[i+1];
    const d = p ? p.poids - e.poids : null;
    const chip = d === null
      ? '<span class="chip chip-gray">départ</span>'
      : d > 0 ? '<span class="chip chip-green">−' + d.toFixed(1) + ' kg</span>'
      : '<span class="chip chip-red">+' + Math.abs(d).toFixed(1) + ' kg</span>';
    return `<div class="hist-item">
      <div class="hist-top">
        <div><div class="hist-date">${weekLabel(e.key)}</div><div class="hist-poids">${e.poids.toFixed(1)} kg</div></div>
        ${chip}
      </div>
      <div class="hist-meta">
        ${dots(e.moral,'on')} ${dots(e.plan,'deep')}
        <span style="font-size:11px;font-family:DM Mono,monospace;color:${pasClr(e.pas)}">${pasLbl(e.pas)}</span>
      </div>
      ${e.note ? '<div class="hist-note">"' + esc(e.note) + '"</div>' : ''}
    </div>`;
  }).join('');

  return summary + '<div class="card" style="margin-top:14px"><div class="card-label">Historique des pesées</div>' + rows + '</div><div class="spacer"></div>';
}

// ═══ RENDER ═══
const TITLES = {
  journal: 'Journal du jour',
  coach: 'Coach IA',
  repas: 'Plan repas',
  pesee: 'Pesée hebdo',
  historique: 'Mon bilan'
};

function render() {
  $('pg-title').textContent = TITLES[view] || 'Santé';
  $('pg-sub').textContent = view === 'historique'
    ? '94 → 84 kg · ' + daysLeft() + ' jours'
    : '94 → 84 kg · 27 juillet 2026';

  const V = { journal: vJournal, coach: vCoach, repas: vRepas, pesee: vPesee, historique: vHistorique };
  $('main').innerHTML = V[view]();
}

// ═══ NAVIGATION ═══
function goTo(v) {
  view = v; journalAi = '';
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  $('nav-' + v)?.classList.add('active');
  render();
  if (v === 'coach') scrollChatBottom();
}

function setDay(i) { dayIdx = i; render(); }
function setPas(v) { form.pas = v; render(); }
function updateDots() {
  const m = $('dots-moral'), p = $('dots-plan');
  if (m) m.innerHTML = dots(form.moral,'on');
  if (p) p.innerHTML = dots(form.plan,'deep');
}

// ═══ HANDLERS ═══
function handleJournalAdd() {
  const el = $('journal-input');
  if (!el || !el.value.trim()) return;
  const text = el.value.trim();
  addJournalEntry(text);
  el.value = '';
  // Demander à l'IA d'identifier les calories si possible
  enrichWithAI(text);
}

async function enrichWithAI(text) {
  // Met à jour l'affichage du journal immédiatement
  render();
  // Demande à Claude d'estimer les macros
  try {
    const reply = await askClaude([{ role: 'user', content:
      `Estime les macros pour : "${text}". Réponds UNIQUEMENT en JSON sans markdown : {"kcal":0,"prot":0,"gluc":0,"lip":0}. Valeurs pour la portion décrite.`
    }]);
    const clean = reply.replace(/```json|```/g,'').trim();
    const macros = JSON.parse(clean);
    const k = todayKey();
    if (journal[k] && journal[k].length > 0) {
      const last = journal[k][journal[k].length - 1];
      last.kcal = macros.kcal || 0;
      last.prot = macros.prot || 0;
      last.gluc = macros.gluc || 0;
      last.lip  = macros.lip  || 0;
      await saveJournal();
    }
  } catch(e) {}
  render();
}

function handleChat() {
  const el = $('chat-input');
  if (!el) return;
  const text = el.value.trim();
  if (!text) return;
  el.value = '';
  el.style.height = 'auto';
  sendChat(text);
}
